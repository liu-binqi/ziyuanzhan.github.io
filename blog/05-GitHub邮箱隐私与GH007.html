<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技能图谱 | binqi</title>
    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }

        .universe-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 0;
            background: radial-gradient(ellipse at center, #1a1a2e 0%, #0f0f23 50%, #000000 100%);
        }

        .stars {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 1;
            pointer-events: none;
        }

        .nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            background: rgba(10, 14, 26, 0.78);
            backdrop-filter: blur(24px) saturate(1.4);
            -webkit-backdrop-filter: blur(24px) saturate(1.4);
            padding: 0 28px;
            display: flex;
            align-items: center;
            gap: 4px;
            height: 62px;
            border-bottom: 1px solid transparent;
            background-image: linear-gradient(to right, rgba(96,165,250,0.07), rgba(167,139,250,0.05), transparent 50%);
            box-shadow: 0 1px 0 rgba(255,255,255,0.05), 0 4px 20px rgba(0,0,0,0.25);
        }
        .nav a {
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            font-size: 13.5px;
            font-weight: 500;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 8px 16px;
            border-radius: 10px;
            position: relative;
            letter-spacing: 0.2px;
        }
        .nav a::after {
            content: '';
            position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%) scaleX(0);
            width: 18px; height: 2px; border-radius: 2px;
            background: linear-gradient(90deg, #60a5fa, #22d3ee);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 8px rgba(96,165,250,0.4);
        }
        .nav a:hover {
            color: #fff;
            background: rgba(96,165,250,0.1);
            text-shadow: 0 0 16px rgba(96,165,250,0.45);
        }
        .nav a:hover::after { transform: translateX(-50%) scaleX(1); }
        .nav-title {
            font-size: 17px;
            font-weight: 800;
            color: #fff;
            margin-right: auto;
            background: linear-gradient(135deg,#fff,#60a5fa,#a78bfa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            letter-spacing: 1px;
        }

        .legend {
            position: fixed;
            top: 80px; right: 24px;
            z-index: 50;
            background: rgba(10, 15, 40, 0.7);
            backdrop-filter: blur(20px) saturate(180%);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(100, 200, 255, 0.2);
            font-size: 13px;
            box-shadow: 0 8px 32px rgba(0, 100, 255, 0.15),
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            min-width: 160px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            padding: 4px 0;
            transition: all 0.3s;
        }
        .legend-item:hover {
            transform: translateX(4px);
        }
        .legend-dot {
            width: 14px; height: 14px;
            border-radius: 50%;
            box-shadow: 0 0 10px currentColor;
        }

        .tooltip {
            position: absolute;
            z-index: 200;
            background: rgba(10, 15, 40, 0.9);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(100, 200, 255, 0.3);
            border-radius: 16px;
            padding: 20px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            max-width: 300px;
            box-shadow: 0 12px 48px rgba(0, 100, 255, 0.25),
                        0 0 0 1px rgba(255, 255, 255, 0.05);
        }
        .tooltip.show { opacity: 1; }
        .tooltip h3 {
            margin: 0 0 10px 0;
            font-size: 18px;
            color: #fff;
            text-shadow: 0 0 10px rgba(100, 200, 255, 0.5);
        }
        .tooltip .category {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            margin-bottom: 10px;
            font-weight: 600;
            border: 1px solid;
            box-shadow: 0 0 10px currentColor;
        }
        .tooltip .desc {
            font-size: 13px;
            color: rgba(200, 230, 255, 0.8);
            line-height: 1.6;
            margin-bottom: 12px;
        }
        .tooltip .level-bar {
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 8px;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.3);
        }
        .tooltip .level-fill {
            height: 100%;
            border-radius: 3px;
            box-shadow: 0 0 10px currentColor;
            transition: width 0.3s ease;
        }
        .tooltip .level-text {
            font-size: 11px;
            color: rgba(200, 230, 255, 0.6);
            margin-top: 6px;
        }

        .controls {
            position: fixed;
            bottom: 24px; left: 24px;
            z-index: 50;
            display: flex;
            gap: 10px;
        }
        .controls button {
            background: rgba(10, 15, 40, 0.7);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(100, 200, 255, 0.2);
            color: rgba(200, 230, 255, 0.9);
            padding: 10px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 16px rgba(0, 100, 255, 0.1);
        }
        .controls button:hover {
            background: rgba(100, 200, 255, 0.15);
            border-color: rgba(100, 200, 255, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(0, 100, 255, 0.2);
        }
        .controls button:active {
            transform: translateY(0);
        }

        svg { cursor: grab; }
        svg:active { cursor: grabbing; }
        .node circle {
            cursor: pointer;
            transition: filter 0.3s;
        }
        .node:hover circle {
            filter: brightness(1.3) drop-shadow(0 0 15px currentColor);
        }
        .node text {
            font-size: 12px;
            fill: #fff;
            pointer-events: none;
            text-shadow: 0 0 8px rgba(0,0,0,0.8), 0 2px 4px rgba(0,0,0,0.5);
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .link {
            stroke-opacity: 0.35;
            transition: stroke-opacity 0.3s, stroke-width 0.3s;
        }

        .search-box {
            position: fixed;
            top: 80px; left: 24px;
            z-index: 50;
        }
        .search-box input {
            background: rgba(10, 15, 40, 0.7);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(100, 200, 255, 0.2);
            color: #fff;
            padding: 10px 16px;
            border-radius: 10px;
            width: 220px;
            font-size: 13px;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 16px rgba(0, 100, 255, 0.1);
        }
        .search-box input::placeholder { color: rgba(200, 230, 255, 0.4); }
        .search-box input:focus {
            border-color: rgba(100, 200, 255, 0.5);
            box-shadow: 0 4px 24px rgba(0, 100, 255, 0.2);
            width: 260px;
        }

        .loading {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(200, 230, 255, 0.7);
            font-size: 16px;
            z-index: 10;
            text-align: center;
        }
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(100, 200, 255, 0.2);
            border-top-color: rgba(100, 200, 255, 0.8);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
            box-shadow: 0 0 20px rgba(100, 200, 255, 0.3);
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .glow-effect {
            position: fixed;
            pointer-events: none;
            z-index: 2;
            mix-blend-mode: screen;
        }

    /* ===== 科技风统一增强 ===== */
    body {
        background-image: radial-gradient(ellipse 120% 90% at 50% 0%, #1a2150 0%, #0f172a 45%, #070a18 100%) !important;
        background-attachment: fixed;
        color: #e2e8f0 !important;
    }
    .nav a:hover, .article-title:hover, .toc a:hover, .back-to-list:hover, .pager a:hover { color: #93c5fd !important; }
</style>
<link rel="stylesheet" href="../assets/techfx.css">
</head>
<body>
    <div class="universe-bg"></div>
    <svg class="stars" id="starField"></svg>

    <div class="nav">
        <span class="nav-title">🕸️ 技能图谱</span>
        <a href="../index.html">🏠 首页</a>
        <a href="../blog/index.html">📝 博客</a>
        <a href="../channels.html">🎯 频道</a>
            <a href="../skills.html">🕸️ 技能图谱</a>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="搜索技能..." autocomplete="off">
    </div>

    <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#ff6b6b;color:#ff6b6b"></div><span>编程语言</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#4ecdc4;color:#4ecdc4"></div><span>前端开发</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#45b7d1;color:#45b7d1"></div><span>后端/数据库</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#ffa502;color:#ffa502"></div><span>DevOps/工具</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#a55eea;color:#a55eea"></div><span>AI/数据</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#26de81;color:#26de81"></div><span>软技能</span></div>
    </div>

    <div class="controls">
        <button onclick="resetZoom()">⟲ 重置视图</button>
        <button onclick="toggleAnimation()">⏸ 暂停/继续</button>
    </div>

    <div class="tooltip" id="tooltip"></div>
    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
        <div>加载技能数据中...</div>
    </div>
    <div id="graph"></div>

    <script>
        const colors = {
            lang: "#ff6b6b",
            frontend: "#4ecdc4",
            backend: "#45b7d1",
            devops: "#ffa502",
            ai: "#a55eea",
            soft: "#26de81",
            center: "#ffffff"
        };
        const groupNames = {
            lang: "编程语言",
            frontend: "前端开发",
            backend: "后端/数据库",
            devops: "DevOps/工具",
            ai: "AI/数据",
            soft: "软技能",
            center: "核心"
        };

        const width = window.innerWidth;
        const height = window.innerHeight;

        const svg = d3.select("#graph")
            .append("svg")
            .attr("width", width)
            .attr("height", height)
            .attr("viewBox", [-width/2, -height/2, width, height]);

        const defs = svg.append("defs");

        const glowFilter = defs.append("filter")
            .attr("id", "glow")
            .attr("x", "-50%")
            .attr("y", "-50%")
            .attr("width", "200%")
            .attr("height", "200%");

        glowFilter.append("feGaussianBlur")
            .attr("stdDeviation", "3")
            .attr("result", "coloredBlur");

        const feMerge = glowFilter.append("feMerge");
        feMerge.append("feMergeNode").attr("in", "coloredBlur");
        feMerge.append("feMergeNode").attr("in", "SourceGraphic");

        const gradientData = [
            { id: "grad-lang", from: "#ff6b6b", to: "#ff8e8e" },
            { id: "grad-frontend", from: "#4ecdc4", to: "#6ee7df" },
            { id: "grad-backend", from: "#45b7d1", to: "#65d7f1" },
            { id: "grad-devops", from: "#ffa502", to: "#ffc542" },
            { id: "grad-ai", from: "#a55eea", to: "#c58ef9" },
            { id: "grad-soft", from: "#26de81", to: "#46fe91" },
            { id: "grad-center", from: "#ffffff", to: "#f0f8ff" }
        ];

        gradientData.forEach(grad => {
            const gradient = defs.append("linearGradient")
                .attr("id", grad.id)
                .attr("x1", "0%")
                .attr("y1", "0%")
                .attr("x2", "100%")
                .attr("y2", "100%");

            gradient.append("stop")
                .attr("offset", "0%")
                .attr("stop-color", grad.from);

            gradient.append("stop")
                .attr("offset", "100%")
                .attr("stop-color", grad.to);
        });

        const g = svg.append("g");

        const zoom = d3.zoom()
            .scaleExtent([0.1, 4])
            .on("zoom", (event) => g.attr("transform", event.transform));
        svg.call(zoom);

        const tooltip = d3.select("#tooltip");

        function createStars() {
            const starSvg = d3.select("#starField");
            const numStars = 200;

            for (let i = 0; i < numStars; i++) {
                const x = Math.random() * width;
                const y = Math.random() * height;
                const r = Math.random() * 1.5 + 0.5;
                const opacity = Math.random() * 0.8 + 0.2;

                starSvg.append("circle")
                    .attr("cx", x)
                    .attr("cy", y)
                    .attr("r", r)
                    .attr("fill", "#fff")
                    .attr("opacity", opacity)
                    .transition()
                    .duration(Math.random() * 3000 + 2000)
                    .ease(d3.easeSinInOut)
                    .attr("opacity", opacity * 0.3)
                    .transition()
                    .duration(Math.random() * 3000 + 2000)
                    .ease(d3.easeSinInOut)
                    .attr("opacity", opacity)
                    .on("end", function repeat() {
                        d3.select(this)
                            .transition()
                            .duration(Math.random() * 3000 + 2000)
                            .ease(d3.easeSinInOut)
                            .attr("opacity", opacity * 0.3)
                            .transition()
                            .duration(Math.random() * 3000 + 2000)
                            .ease(d3.easeSinInOut)
                            .attr("opacity", opacity)
                            .on("end", repeat);
                    });
            }
        }
        createStars();

        fetch('skills.json')
            .then(res => {
                if (!res.ok) throw new Error('加载失败');
                return res.json();
            })
            .then(data => {
                document.getElementById('loading').style.display = 'none';
                initGraph(data);
            })
            .catch(err => {
                document.getElementById('loading').textContent = '加载失败: ' + err.message;
                console.error(err);
            });

        function initGraph(skillData) {
            skillData.nodes[0].id = "binqi";

            const simulation = d3.forceSimulation(skillData.nodes)
                .force("link", d3.forceLink(skillData.links)
                    .id(d => d.id)
                    .distance(d => d.source.group === "center" || d.target.group === "center" ? 150 : 100))
                .force("charge", d3.forceManyBody()
                    .strength(d => d.group === "center" ? -1500 : -400))
                .force("center", d3.forceCenter(0, 0))
                .force("collision", d3.forceCollide()
                    .radius(d => d.group === "center" ? 60 : 38))
                .force("x", d3.forceX().strength(0.03))
                .force("y", d3.forceY().strength(0.03));

            const link = g.append("g")
                .selectAll("line")
                .data(skillData.links)
                .join("line")
                .attr("class", "link")
                .attr("stroke", "#fff")
                .attr("stroke-width", d => d.source.group === "center" || d.target.group === "center" ? 2.5 : 1.5);

            const node = g.append("g")
                .selectAll("g")
                .data(skillData.nodes)
                .join("g")
                .attr("class", "node")
                .call(d3.drag()
                    .on("start", (event, d) => {
                        if (!event.active) simulation.alphaTarget(0.3).restart();
                        d.fx = d.x; d.fy = d.y;
                    })
                    .on("drag", (event, d) => {
                        d.fx = event.x; d.fy = event.y;
                    })
                    .on("end", (event, d) => {
                        if (!event.active) simulation.alphaTarget(0);
                        d.fx = null; d.fy = null;
                    }));

            node.append("circle")
                .attr("r", d => d.group === "center" ? 48 : Math.max(18, d.level / 4))
                .attr("fill", d => `url(#grad-${d.group})`)
                .attr("stroke", d => colors[d.group])
                .attr("stroke-width", d => d.group === "center" ? 4 : 2.5)
                .attr("stroke-opacity", 0.9)
                .attr("filter", "url(#glow)")
                .style("color", d => colors[d.group]);

            node.filter(d => d.group === "center")
                .append("circle")
                .attr("r", 48)
                .attr("fill", "none")
                .attr("stroke", "#fff")
                .attr("stroke-width", 2)
                .attr("stroke-opacity", 0.6)
                .transition()
                .duration(2000)
                .ease(d3.easeLinear)
                .attr("r", 58)
                .attr("stroke-opacity", 0)
                .transition()
                .duration(0)
                .attr("r", 48)
                .attr("stroke-opacity", 0.6)
                .on("end", function repeat() {
                    d3.select(this)
                        .transition()
                        .duration(2000)
                        .ease(d3.easeLinear)
                        .attr("r", 58)
                        .attr("stroke-opacity", 0)
                        .transition()
                        .duration(0)
                        .attr("r", 48)
                        .attr("stroke-opacity", 0.6)
                        .on("end", repeat);
                });

            node.append("text")
                .attr("dy", d => d.group === "center" ? 5 : 4)
                .attr("text-anchor", "middle")
                .text(d => d.id)
                .style("font-size", d => d.group === "center" ? "15px" : "11px")
                .style("font-weight", d => d.group === "center" ? "700" : "600");

            node.on("mouseover", function(event, d) {
                link.style("stroke-opacity", l =>
                    (l.source.id === d.id || l.target.id === d.id) ? 0.8 : 0.1)
                    .style("stroke-width", l =>
                    (l.source.id === d.id || l.target.id === d.id) ? 3 : 1.5)
                    .attr("stroke", l =>
                    (l.source.id === d.id || l.target.id === d.id) ? colors[d.group] : "#fff");

                node.style("opacity", n => {
                    const isConnected = skillData.links.some(l =>
                        (l.source.id === d.id && l.target.id === n.id) ||
                        (l.target.id === d.id && l.source.id === n.id));
                    return (n.id === d.id || isConnected || n.group === "center") ? 1 : 0.25;
                });

                tooltip.html(`
                    <h3>${d.id}</h3>
                    <span class="category" style="background:${colors[d.group]}33;color:${colors[d.group]};border-color:${colors[d.group]}">
                        ${groupNames[d.group]}
                    </span>
                    <div class="desc">${d.desc}</div>
                    <div class="level-text">掌握程度: ${d.level}%</div>
                    <div class="level-bar">
                        <div class="level-fill" style="width:${d.level}%;background:${colors[d.group]};color:${colors[d.group]}"></div>
                    </div>
                `);
                tooltip
                    .style("left", (event.pageX + 15) + "px")
                    .style("top", (event.pageY - 10) + "px")
                    .classed("show", true);
            })
            .on("mousemove", function(event) {
                tooltip
                    .style("left", (event.pageX + 15) + "px")
                    .style("top", (event.pageY - 10) + "px");
            })
            .on("mouseout", function() {
                link.style("stroke-opacity", 0.35)
                    .style("stroke-width", d =>
                        d.source.group === "center" || d.target.group === "center" ? 2.5 : 1.5)
                    .attr("stroke", "#fff");
                node.style("opacity", 1);
                tooltip.classed("show", false);
            })
            .on("click", function() {
                simulation.alpha(0.3).restart();
            });

            const searchInput = document.getElementById("searchInput");
            searchInput.addEventListener("input", function(e) {
                const term = e.target.value.toLowerCase();
                if (!term) {
                    node.style("opacity", 1);
                    link.style("stroke-opacity", 0.35).attr("stroke", "#fff");
                    return;
                }
                const matched = skillData.nodes.filter(n => n.id.toLowerCase().includes(term));
                const matchedIds = new Set(matched.map(n => n.id));
                node.style("opacity", n => matchedIds.has(n.id) ? 1 : 0.15);
                link.style("stroke-opacity", l =>
                    (matchedIds.has(l.source.id) && matchedIds.has(l.target.id)) ? 0.6 : 0.05);
            });

            simulation.on("tick", () => {
                link
                    .attr("x1", d => d.source.x)
                    .attr("y1", d => d.source.y)
                    .attr("x2", d => d.target.x)
                    .attr("y2", d => d.target.y);
                node.attr("transform", d => `translate(${d.x},${d.y})`);
            });

            window.resetZoom = function() {
                svg.transition().duration(750).call(zoom.transform, d3.zoomIdentity);
                simulation.alpha(0.5).restart();
            };

            let isRunning = true;
            window.toggleAnimation = function() {
                if (isRunning) simulation.stop();
                else simulation.restart();
                isRunning = !isRunning;
            };

            setTimeout(resetZoom, 800);
        }

        window.addEventListener("resize", () => {
            const w = window.innerWidth, h = window.innerHeight;
            svg.attr("width", w).attr("height", h)
               .attr("viewBox", [-w/2, -h/2, w, h]);
            d3.select("#starField").selectAll("*").remove();
            createStars();
        });
    </script>
<script src="../assets/bubbles.js"></script>
</body>
