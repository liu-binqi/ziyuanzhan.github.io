<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技能图谱 | 刘彬棋</title>
    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }
        .nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .nav a {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }
        .nav a:hover { color: #fff; }
        .nav-title {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            margin-right: auto;
        }
        .legend {
            position: fixed;
            top: 70px; right: 20px;
            z-index: 50;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 13px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .legend-dot {
            width: 12px; height: 12px;
            border-radius: 50%;
        }
        .tooltip {
            position: absolute;
            z-index: 200;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            padding: 16px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            max-width: 280px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .tooltip.show { opacity: 1; }
        .tooltip h3 { margin: 0 0 8px 0; font-size: 16px; color: #fff; }
        .tooltip .category {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .tooltip .desc {
            font-size: 13px;
            color: rgba(255,255,255,0.7);
            line-height: 1.5;
            margin-bottom: 10px;
        }
        .tooltip .level-bar {
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 6px;
        }
        .tooltip .level-fill {
            height: 100%;
            border-radius: 2px;
        }
        .tooltip .level-text {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            margin-top: 4px;
        }
        .controls {
            position: fixed;
            bottom: 20px; left: 20px;
            z-index: 50;
            display: flex;
            gap: 8px;
        }
        .controls button {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }
        .controls button:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.3);
        }
        svg { cursor: grab; }
        svg:active { cursor: grabbing; }
        .node circle { cursor: pointer; }
        .node:hover circle { filter: brightness(1.2); }
        .node text {
            font-size: 12px;
            fill: #fff;
            pointer-events: none;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
            font-weight: 500;
        }
        .link { stroke-opacity: 0.4; }
        .search-box {
            position: fixed;
            top: 70px; left: 20px;
            z-index: 50;
        }
        .search-box input {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 8px 14px;
            border-radius: 8px;
            width: 200px;
            font-size: 13px;
            outline: none;
        }
        .search-box input::placeholder { color: rgba(255,255,255,0.4); }
        .search-box input:focus { border-color: rgba(255,255,255,0.3); }
        .loading {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="nav">
        <span class="nav-title">🕸️ 技能图谱</span>
        <a href="index.html">🏠 首页</a>
        <a href="blog/index.html">📝 博客</a>
        <a href="channels.html">🎯 频道</a>
    </div>
    
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="搜索技能..." autocomplete="off">
    </div>
    
    <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#e74c3c"></div><span>编程语言</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#3498db"></div><span>前端开发</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#2ecc71"></div><span>后端/数据库</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#f39c12"></div><span>DevOps/工具</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#9b59b6"></div><span>AI/数据</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#1abc9c"></div><span>软技能</span></div>
    </div>
    
    <div class="controls">
        <button onclick="resetZoom()">⟲ 重置视图</button>
        <button onclick="toggleAnimation()">⏸ 暂停/继续</button>
    </div>
    
    <div class="tooltip" id="tooltip"></div>
    <div class="loading" id="loading">加载技能数据中...</div>
    <div id="graph"></div>

    <script>
        const colors = {
            lang: "#e74c3c",
            frontend: "#3498db",
            backend: "#2ecc71",
            devops: "#f39c12",
            ai: "#9b59b6",
            soft: "#1abc9c",
            center: "#fff"
        };
        const groupNames = {
            lang: "编程语言",
            frontend: "前端开发",
            backend: "后端/数据库",
            devops: "DevOps/工具",
            ai: "AI/数据",
            soft: "软技能",
            center: "核心"
        };

        const width = window.innerWidth;
        const height = window.innerHeight;

        const svg = d3.select("#graph")
            .append("svg")
            .attr("width", width)
            .attr("height", height)
            .attr("viewBox", [-width/2, -height/2, width, height]);

        const g = svg.append("g");

        const zoom = d3.zoom()
            .scaleExtent([0.1, 4])
            .on("zoom", (event) => g.attr("transform", event.transform));
        svg.call(zoom);

        const tooltip = d3.select("#tooltip");

        // 加载 JSON 数据
        fetch('skills.json')
            .then(res => {
                if (!res.ok) throw new Error('加载失败');
                return res.json();
            })
            .then(data => {
                document.getElementById('loading').style.display = 'none';
                initGraph(data);
            })
            .catch(err => {
                document.getElementById('loading').textContent = '加载失败: ' + err.message;
                console.error(err);
            });

        function initGraph(skillData) {
            const simulation = d3.forceSimulation(skillData.nodes)
                .force("link", d3.forceLink(skillData.links)
                    .id(d => d.id)
                    .distance(d => d.source.group === "center" || d.target.group === "center" ? 130 : 90))
                .force("charge", d3.forceManyBody()
                    .strength(d => d.group === "center" ? -1000 : -350))
                .force("center", d3.forceCenter(0, 0))
                .force("collision", d3.forceCollide()
                    .radius(d => d.group === "center" ? 55 : 35))
                .force("x", d3.forceX().strength(0.04))
                .force("y", d3.forceY().strength(0.04));

            const link = g.append("g")
                .selectAll("line")
                .data(skillData.links)
                .join("line")
                .attr("class", "link")
                .attr("stroke", "#fff")
                .attr("stroke-width", d => d.source.group === "center" || d.target.group === "center" ? 2 : 1);

            const node = g.append("g")
                .selectAll("g")
                .data(skillData.nodes)
                .join("g")
                .attr("class", "node")
                .call(d3.drag()
                    .on("start", (event, d) => {
                        if (!event.active) simulation.alphaTarget(0.3).restart();
                        d.fx = d.x; d.fy = d.y;
                    })
                    .on("drag", (event, d) => {
                        d.fx = event.x; d.fy = event.y;
                    })
                    .on("end", (event, d) => {
                        if (!event.active) simulation.alphaTarget(0);
                        d.fx = null; d.fy = null;
                    }));

            node.append("circle")
                .attr("r", d => d.group === "center" ? 42 : Math.max(16, d.level / 4.5))
                .attr("fill", d => colors[d.group])
                .attr("stroke", "#fff")
                .attr("stroke-width", d => d.group === "center" ? 3 : 2)
                .attr("stroke-opacity", 0.8);

            node.append("text")
                .attr("dy", d => d.group === "center" ? 5 : 4)
                .attr("text-anchor", "middle")
                .text(d => d.id)
                .style("font-size", d => d.group === "center" ? "14px" : "11px")
                .style("font-weight", d => d.group === "center" ? "700" : "500");

            node.on("mouseover", function(event, d) {
                link.style("stroke-opacity", l => 
                    (l.source.id === d.id || l.target.id === d.id) ? 1 : 0.1);
                link.style("stroke-width", l => 
                    (l.source.id === d.id || l.target.id === d.id) ? 2.5 : 1);
                node.style("opacity", n => {
                    const isConnected = skillData.links.some(l => 
                        (l.source.id === d.id && l.target.id === n.id) ||
                        (l.target.id === d.id && l.source.id === n.id));
                    return (n.id === d.id || isConnected || n.group === "center") ? 1 : 0.3;
                });

                tooltip.html(`
                    <h3>${d.id}</h3>
                    <span class="category" style="background:${colors[d.group]}22;color:${colors[d.group]};border:1px solid ${colors[d.group]}66">
                        ${groupNames[d.group]}
                    </span>
                    <div class="desc">${d.desc}</div>
                    <div class="level-text">掌握程度: ${d.level}%</div>
                    <div class="level-bar">
                        <div class="level-fill" style="width:${d.level}%;background:${colors[d.group]}"></div>
                    </div>
                `);
                tooltip
                    .style("left", (event.pageX + 15) + "px")
                    .style("top", (event.pageY - 10) + "px")
                    .classed("show", true);
            })
            .on("mousemove", function(event) {
                tooltip
                    .style("left", (event.pageX + 15) + "px")
                    .style("top", (event.pageY - 10) + "px");
            })
            .on("mouseout", function() {
                link.style("stroke-opacity", 0.4).style("stroke-width", d => 
                    d.source.group === "center" || d.target.group === "center" ? 2 : 1);
                node.style("opacity", 1);
                tooltip.classed("show", false);
            })
            .on("click", function() {
                simulation.alpha(0.3).restart();
            });

            const searchInput = document.getElementById("searchInput");
            searchInput.addEventListener("input", function(e) {
                const term = e.target.value.toLowerCase();
                if (!term) {
                    node.style("opacity", 1);
                    link.style("stroke-opacity", 0.4);
                    return;
                }
                const matched = skillData.nodes.filter(n => n.id.toLowerCase().includes(term));
                const matchedIds = new Set(matched.map(n => n.id));
                node.style("opacity", n => matchedIds.has(n.id) ? 1 : 0.15);
                link.style("stroke-opacity", l => 
                    (matchedIds.has(l.source.id) && matchedIds.has(l.target.id)) ? 0.6 : 0.05);
            });

            simulation.on("tick", () => {
                link
                    .attr("x1", d => d.source.x)
                    .attr("y1", d => d.source.y)
                    .attr("x2", d => d.target.x)
                    .attr("y2", d => d.target.y);
                node.attr("transform", d => `translate(${d.x},${d.y})`);
            });

            window.resetZoom = function() {
                svg.transition().duration(750).call(zoom.transform, d3.zoomIdentity);
                simulation.alpha(0.5).restart();
            };

            let isRunning = true;
            window.toggleAnimation = function() {
                if (isRunning) simulation.stop();
                else simulation.restart();
                isRunning = !isRunning;
            };

            setTimeout(resetZoom, 600);
        }

        window.addEventListener("resize", () => {
            const w = window.innerWidth, h = window.innerHeight;
            svg.attr("width", w).attr("height", h)
               .attr("viewBox", [-w/2, -h/2, w, h]);
        });
    </script>
</body>
</html>
