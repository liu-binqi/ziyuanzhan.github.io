<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技能图谱 | 刘斌奇</title>
    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }
        
        /* 顶部导航 */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .nav a {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }
        .nav a:hover { color: #fff; }
        .nav-title {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            margin-right: auto;
        }
        
        /* 图例 */
        .legend {
            position: fixed;
            top: 70px;
            right: 20px;
            z-index: 50;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 13px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        
        /* 提示框 */
        .tooltip {
            position: absolute;
            z-index: 200;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            padding: 16px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            max-width: 280px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .tooltip.show { opacity: 1; }
        .tooltip h3 {
            margin: 0 0 8px 0;
            font-size: 16px;
            color: #fff;
        }
        .tooltip .category {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .tooltip .desc {
            font-size: 13px;
            color: rgba(255,255,255,0.7);
            line-height: 1.5;
            margin-bottom: 10px;
        }
        .tooltip .level-bar {
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 6px;
        }
        .tooltip .level-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.3s;
        }
        .tooltip .level-text {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            margin-top: 4px;
        }
        
        /* 控制按钮 */
        .controls {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 50;
            display: flex;
            gap: 8px;
        }
        .controls button {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }
        .controls button:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.3);
        }
        
        /* SVG 样式 */
        svg { cursor: grab; }
        svg:active { cursor: grabbing; }
        
        .node circle {
            transition: all 0.3s;
            cursor: pointer;
        }
        .node:hover circle {
            filter: brightness(1.2);
        }
        .node text {
            font-size: 12px;
            fill: #fff;
            pointer-events: none;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
            font-weight: 500;
        }
        .link {
            stroke-opacity: 0.4;
            transition: stroke-opacity 0.3s;
        }
        
        /* 搜索框 */
        .search-box {
            position: fixed;
            top: 70px;
            left: 20px;
            z-index: 50;
        }
        .search-box input {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 8px 14px;
            border-radius: 8px;
            width: 200px;
            font-size: 13px;
            outline: none;
        }
        .search-box input::placeholder { color: rgba(255,255,255,0.4); }
        .search-box input:focus {
            border-color: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    <div class="nav">
        <span class="nav-title">🕸️ 技能图谱</span>
        <a href="index.html">🏠 首页</a>
        <a href="blog/index.html">📝 博客</a>
        <a href="channels.html">🎯 频道</a>
    </div>
    
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="搜索技能..." autocomplete="off">
    </div>
    
    <div class="legend">
        <div class="legend-item">
            <div class="legend-dot" style="background:#e74c3c"></div>
            <span>编程语言</span>
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background:#3498db"></div>
            <span>前端开发</span>
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background:#2ecc71"></div>
            <span>后端/数据库</span>
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background:#f39c12"></div>
            <span>DevOps/工具</span>
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background:#9b59b6"></div>
            <span>AI/数据</span>
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background:#1abc9c"></div>
            <span>软技能</span>
        </div>
    </div>
    
    <div class="controls">
        <button onclick="resetZoom()">⟲ 重置视图</button>
        <button onclick="toggleAnimation()">⏸ 暂停/继续</button>
    </div>
    
    <div class="tooltip" id="tooltip"></div>
    
    <div id="graph"></div>

    <script>
        // ==================== 数据配置 ====================
        // 你可以随时修改这个对象来更新你的技能
        const skillData = {
            nodes: [
                // 编程语言
                { id: "JavaScript", group: "lang", level: 90, desc: "熟练掌握 ES6+，异步编程，闭包，原型链" },
                { id: "Python", group: "lang", level: 85, desc: "数据分析，自动化脚本，Flask/FastAPI" },
                { id: "Java", group: "lang", level: 75, desc: "Spring Boot，多线程，JVM 调优基础" },
                { id: "C/C++", group: "lang", level: 70, desc: "数据结构，算法竞赛，系统编程基础" },
                { id: "SQL", group: "lang", level: 80, desc: "复杂查询优化，索引设计，事务管理" },
                { id: "HTML/CSS", group: "lang", level: 95, desc: "语义化标签，Flex/Grid，响应式设计，动画" },
                
                // 前端
                { id: "React", group: "frontend", level: 85, desc: "Hooks，Redux，Next.js，性能优化" },
                { id: "Vue.js", group: "frontend", level: 80, desc: "Vue3 Composition API，Pinia，Nuxt.js" },
                { id: "D3.js", group: "frontend", level: 75, desc: "数据可视化，力导向图，交互式图表" },
                { id: "Tailwind", group: "frontend", level: 90, desc: "原子化 CSS，自定义主题，响应式工具类" },
                { id: "TypeScript", group: "frontend", level: 82, desc: "类型系统，泛型，装饰器，类型推断" },
                { id: "Webpack/Vite", group: "frontend", level: 78, desc: "打包优化，代码分割，热更新配置" },
                
                // 后端
                { id: "Node.js", group: "backend", level: 80, desc: "Express/Koa，事件循环，Stream，Buffer" },
                { id: "Spring Boot", group: "backend", level: 72, desc: "RESTful API，AOP，事务管理，微服务入门" },
                { id: "MySQL", group: "backend", level: 78, desc: "表设计，慢查询优化，主从复制" },
                { id: "Redis", group: "backend", level: 75, desc: "缓存策略，持久化，分布式锁，Pub/Sub" },
                { id: "MongoDB", group: "backend", level: 65, desc: "文档模型，聚合管道，索引优化" },
                { id: "Docker", group: "backend", level: 70, desc: "容器化，Dockerfile，Compose，镜像优化" },
                
                // DevOps/工具
                { id: "Git", group: "devops", level: 88, desc: "分支策略，Rebase，Cherry-pick，CI/CD 集成" },
                { id: "Linux", group: "devops", level: 82, desc: "Shell 脚本，进程管理，系统调优，网络配置" },
                { id: "Nginx", group: "devops", level: 75, desc: "反向代理，负载均衡，SSL，缓存配置" },
                { id: "GitHub Actions", group: "devops", level: 70, desc: "自动化部署，工作流编排，矩阵构建" },
                { id: "AWS/阿里云", group: "devops", level: 65, desc: "ECS，OSS，RDS，Serverless 基础" },
                
                // AI/数据
                { id: "机器学习", group: "ai", level: 60, desc: "监督/无监督学习，特征工程，模型评估" },
                { id: "深度学习", group: "ai", level: 55, desc: "CNN，RNN 基础，PyTorch 入门" },
                { id: "NLP", group: "ai", level: 58, desc: "文本分类，命名实体识别，Transformer 基础" },
                { id: "Pandas", group: "ai", level: 72, desc: "数据清洗，透视表，时间序列处理" },
                { id: "OpenAI API", group: "ai", level: 80, desc: "Prompt Engineering，Function Calling，RAG 基础" },
                
                // 软技能
                { id: "技术写作", group: "soft", level: 85, desc: "技术博客，文档编写，知识沉淀" },
                { id: "项目管理", group: "soft", level: 70, desc: "敏捷开发，任务拆解，进度把控" },
                { id: "团队协作", group: "soft", level: 88, desc: "Code Review，技术分享，跨部门沟通" },
                { id: "问题解决", group: "soft", level: 90, desc: "Debug 思路，根因分析，系统性思维" },
                
                // 核心节点（中心）
                { id: "刘斌奇", group: "center", level: 100, desc: "全栈开发工程师 | 热爱技术，持续学习" }
            ],
            links: [
                // 中心连接所有大类
                { source: "刘斌奇", target: "JavaScript" },
                { source: "刘斌奇", target: "Python" },
                { source: "刘斌奇", target: "React" },
                { source: "刘斌奇", target: "Node.js" },
                { source: "刘斌奇", target: "Git" },
                { source: "刘斌奇", target: "机器学习" },
                { source: "刘斌奇", target: "技术写作" },
                
                // 语言内部关联
                { source: "JavaScript", target: "TypeScript" },
                { source: "JavaScript", target: "HTML/CSS" },
                { source: "JavaScript", target: "Node.js" },
                { source: "Python", target: "机器学习" },
                { source: "Python", target: "Pandas" },
                { source: "Python", target: "NLP" },
                { source: "Java", target: "Spring Boot" },
                { source: "SQL", target: "MySQL" },
                { source: "SQL", target: "Redis" },
                { source: "SQL", target: "MongoDB" },
                
                // 前端关联
                { source: "React", target: "TypeScript" },
                { source: "React", target: "Webpack/Vite" },
                { source: "React", target: "D3.js" },
                { source: "Vue.js", target: "TypeScript" },
                { source: "Vue.js", target: "Webpack/Vite" },
                { source: "Tailwind", target: "HTML/CSS" },
                { source: "HTML/CSS", target: "D3.js" },
                
                // 后端关联
                { source: "Node.js", target: "Express" },
                { source: "Node.js", target: "Docker" },
                { source: "Spring Boot", target: "MySQL" },
                { source: "Spring Boot", target: "Redis" },
                { source: "Spring Boot", target: "Docker" },
                { source: "MySQL", target: "Redis" },
                { source: "Docker", target: "Nginx" },
                { source: "Docker", target: "AWS/阿里云" },
                
                // DevOps 关联
                { source: "Git", target: "GitHub Actions" },
                { source: "Git", target: "Linux" },
                { source: "Linux", target: "Nginx" },
                { source: "Linux", target: "Docker" },
                { source: "Nginx", target: "AWS/阿里云" },
                
                // AI 关联
                { source: "机器学习", target: "深度学习" },
                { source: "机器学习", target: "Pandas" },
                { source: "深度学习", target: "NLP" },
                { source: "NLP", target: "OpenAI API" },
                { source: "OpenAI API", target: "Python" },
                
                // 软技能关联
                { source: "技术写作", target: "团队协作" },
                { source: "团队协作", target: "项目管理" },
                { source: "问题解决", target: "技术写作" },
                { source: "问题解决", target: "团队协作" }
            ]
        };

        // ==================== 配置 ====================
        const colors = {
            lang: "#e74c3c",
            frontend: "#3498db",
            backend: "#2ecc71",
            devops: "#f39c12",
            ai: "#9b59b6",
            soft: "#1abc9c",
            center: "#fff"
        };
        
        const groupNames = {
            lang: "编程语言",
            frontend: "前端开发",
            backend: "后端/数据库",
            devops: "DevOps/工具",
            ai: "AI/数据",
            soft: "软技能",
            center: "核心"
        };

        const width = window.innerWidth;
        const height = window.innerHeight;
        
        // ==================== 初始化 SVG ====================
        const svg = d3.select("#graph")
            .append("svg")
            .attr("width", width)
            .attr("height", height)
            .attr("viewBox", [-width/2, -height/2, width, height]);
            
        const g = svg.append("g");
        
        // 缩放行为
        const zoom = d3.zoom()
            .scaleExtent([0.1, 4])
            .on("zoom", (event) => {
                g.attr("transform", event.transform);
            });
        svg.call(zoom);
        
        // ==================== 力导向模拟 ====================
        const simulation = d3.forceSimulation(skillData.nodes)
            .force("link", d3.forceLink(skillData.links)
                .id(d => d.id)
                .distance(d => d.source.group === "center" || d.target.group === "center" ? 120 : 80))
            .force("charge", d3.forceManyBody()
                .strength(d => d.group === "center" ? -800 : -300))
            .force("center", d3.forceCenter(0, 0))
            .force("collision", d3.forceCollide()
                .radius(d => d.group === "center" ? 50 : 30))
            .force("x", d3.forceX().strength(0.05))
            .force("y", d3.forceY().strength(0.05));
        
        // ==================== 绘制连线 ====================
        const link = g.append("g")
            .attr("class", "links")
            .selectAll("line")
            .data(skillData.links)
            .join("line")
            .attr("class", "link")
            .attr("stroke", "#fff")
            .attr("stroke-width", d => d.source.group === "center" || d.target.group === "center" ? 2 : 1);
        
        // ==================== 绘制节点 ====================
        const node = g.append("g")
            .attr("class", "nodes")
            .selectAll("g")
            .data(skillData.nodes)
            .join("g")
            .attr("class", "node")
            .call(d3.drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended));
        
        // 节点圆圈
        node.append("circle")
            .attr("r", d => d.group === "center" ? 40 : Math.max(15, d.level / 4))
            .attr("fill", d => colors[d.group])
            .attr("stroke", "#fff")
            .attr("stroke-width", d => d.group === "center" ? 3 : 2)
            .attr("stroke-opacity", 0.8);
        
        // 节点文字
        node.append("text")
            .attr("dy", d => d.group === "center" ? 5 : 4)
            .attr("text-anchor", "middle")
            .text(d => d.id)
            .style("font-size", d => d.group === "center" ? "14px" : "11px")
            .style("font-weight", d => d.group === "center" ? "700" : "500");
        
        // ==================== 交互事件 ====================
        const tooltip = d3.select("#tooltip");
        
        node.on("mouseover", function(event, d) {
            // 高亮关联
            link.style("stroke-opacity", l => 
                (l.source.id === d.id || l.target.id === d.id) ? 1 : 0.1);
            link.style("stroke-width", l => 
                (l.source.id === d.id || l.target.id === d.id) ? 2.5 : 1);
            node.style("opacity", n => {
                const isConnected = skillData.links.some(l => 
                    (l.source.id === d.id && l.target.id === n.id) ||
                    (l.target.id === d.id && l.source.id === n.id));
                return (n.id === d.id || isConnected || n.group === "center") ? 1 : 0.3;
            });
            
            // 显示提示框
            const levelColor = colors[d.group];
            tooltip.html(`
                <h3>${d.id}</h3>
                <span class="category" style="background:${colors[d.group]}22;color:${colors[d.group]};border:1px solid ${colors[d.group]}66">
                    ${groupNames[d.group]}
                </span>
                <div class="desc">${d.desc}</div>
                <div class="level-text">掌握程度: ${d.level}%</div>
                <div class="level-bar">
                    <div class="level-fill" style="width:${d.level}%;background:${levelColor}"></div>
                </div>
            `);
            
            tooltip
                .style("left", (event.pageX + 15) + "px")
                .style("top", (event.pageY - 10) + "px")
                .classed("show", true);
        })
        .on("mousemove", function(event) {
            tooltip
                .style("left", (event.pageX + 15) + "px")
                .style("top", (event.pageY - 10) + "px");
        })
        .on("mouseout", function() {
            link.style("stroke-opacity", 0.4).style("stroke-width", d => 
                d.source.group === "center" || d.target.group === "center" ? 2 : 1);
            node.style("opacity", 1);
            tooltip.classed("show", false);
        })
        .on("click", function(event, d) {
            // 点击时重新加热模拟，让相关节点跳动一下
            simulation.alpha(0.3).restart();
        });
        
        // ==================== 搜索功能 ====================
        const searchInput = document.getElementById("searchInput");
        searchInput.addEventListener("input", function(e) {
            const term = e.target.value.toLowerCase();
            if (!term) {
                node.style("opacity", 1);
                link.style("stroke-opacity", 0.4);
                return;
            }
            
            const matched = skillData.nodes.filter(n => n.id.toLowerCase().includes(term));
            const matchedIds = new Set(matched.map(n => n.id));
            
            node.style("opacity", n => matchedIds.has(n.id) ? 1 : 0.15);
            link.style("stroke-opacity", l => 
                (matchedIds.has(l.source.id) && matchedIds.has(l.target.id)) ? 0.6 : 0.05);
        });
        
        // ==================== 模拟更新 ====================
        simulation.on("tick", () => {
            link
                .attr("x1", d => d.source.x)
                .attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x)
                .attr("y2", d => d.target.y);
            
            node.attr("transform", d => `translate(${d.x},${d.y})`);
        });
        
        // ==================== 拖拽函数 ====================
        function dragstarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
        }
        
        function dragged(event, d) {
            d.fx = event.x;
            d.fy = event.y;
        }
        
        function dragended(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
        }
        
        // ==================== 控制函数 ====================
        let isRunning = true;
        function toggleAnimation() {
            if (isRunning) {
                simulation.stop();
            } else {
                simulation.restart();
            }
            isRunning = !isRunning;
        }
        
        function resetZoom() {
            svg.transition().duration(750).call(
                zoom.transform,
                d3.zoomIdentity
            );
            simulation.alpha(1).restart();
        }
        
        // ==================== 窗口自适应 ====================
        window.addEventListener("resize", () => {
            const newWidth = window.innerWidth;
            const newHeight = window.innerHeight;
            svg.attr("width", newWidth).attr("height", newHeight)
               .attr("viewBox", [-newWidth/2, -newHeight/2, newWidth, newHeight]);
            simulation.force("center", d3.forceCenter(0, 0));
            simulation.alpha(0.3).restart();
        });
        
        // 初始居中
        setTimeout(() => {
            resetZoom();
        }, 500);
    </script>
</body>
</html>
