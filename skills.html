<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技能知识图谱 | binqi</title>
    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
    <style>
        :root {
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
            --glass-bg: rgba(14, 17, 40, 0.55);
            --glass-border: rgba(255, 255, 255, 0.13);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5),
                            0 2px 8px rgba(0, 0, 0, 0.38),
                            inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: radial-gradient(ellipse 120% 90% at 50% 42%, #1b2150 0%, #0d1030 38%, #05060f 72%, #000007 100%);
            color: #fff;
            overflow: hidden;
        }

        /* 星空画布 */
        #stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        #graph   { position: fixed; inset: 0; z-index: 1; }

        /* ===== 导航栏 ===== */
        .nav {
            position: fixed; top: 0; left: 0; right: 0;
            z-index: 100;
            background: rgba(10, 14, 26, 0.78);
            backdrop-filter: blur(24px) saturate(1.4); -webkit-backdrop-filter: blur(24px) saturate(1.4);
            padding: 0 28px;
            display: flex; align-items: center; gap: 4px;
            height: 62px;
            border-bottom: 1px solid transparent;
            background-image: linear-gradient(to right, rgba(96,165,250,0.07), rgba(167,139,250,0.05), transparent 50%);
            box-shadow: 0 1px 0 rgba(255,255,255,0.05), 0 4px 20px rgba(0,0,0,0.25);
        }
        .nav a {
            position: relative;
            color: rgba(255,255,255,0.6); text-decoration: none; font-size: 13.5px;
            font-weight: 500;
            padding: 8px 16px; border-radius: 10px;
            transition: all 0.35s var(--ease); letter-spacing: 0.2px;
        }
        .nav a::after {
            content: '';
            position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%) scaleX(0);
            width: 18px; height: 2px; border-radius: 2px;
            background: linear-gradient(90deg, #60a5fa, #22d3ee);
            transition: transform 0.35s var(--ease);
            box-shadow: 0 0 8px rgba(96,165,250,0.4);
        }
        .nav a:hover { color: #fff; background: rgba(96,165,250,0.08); text-shadow: 0 0 16px rgba(96,165,250,0.45); }
        .nav a:hover::after { transform: translateX(-50%) scaleX(1); }
        .nav-title { font-size: 17px; font-weight: 800; color: #fff; margin-right: auto; letter-spacing: 1px; background: linear-gradient(135deg,#fff,#60a5fa,#a78bfa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }

        /* ===== 技能池侧栏（参考面板，只读） ===== */
        .skill-pool {
            position: fixed; top: 74px; left: 14px;
            width: 280px; max-height: calc(100vh - 90px);
            z-index: 50;
            background: var(--glass-bg);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 18px; border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            display: flex; flex-direction: column;
            overflow: hidden;
        }
        .pool-header {
            padding: 16px 18px 12px;
            display: flex; align-items: center; gap: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            flex-shrink: 0;
        }
        .pool-header .menu-icon { font-size: 18px; opacity: 0.7; }
        .pool-header h3 { font-size: 16px; font-weight: 700; flex: 1; }
        .pool-header .subtitle { font-size: 11px; color: rgba(255,255,255,0.35); }
        .pool-search {
            padding: 10px 14px; flex-shrink: 0;
        }
        .pool-search input {
            width: 100%; padding: 9px 14px;
            border-radius: 10px; border: 1px solid rgba(255,255,255,0.09);
            background: rgba(0,0,0,0.25); color: #e2e8f0;
            font-size: 13px; outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .pool-search input:focus { border-color: rgba(96,165,250,0.4); box-shadow: 0 0 12px rgba(96,165,250,0.12); }
        .pool-search input::placeholder { color: rgba(255,255,255,0.28); }
        .pool-list {
            overflow-y: auto; flex: 1; padding: 4px 0;
            scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent;
        }
        .pool-list::-webkit-scrollbar { width: 4px; }
        .pool-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 4px; }
        .pool-group-label {
            padding: 10px 18px 6px; font-size: 11px; font-weight: 600;
            letter-spacing: 0.8px; color: rgba(255,255,255,0.38);
            text-transform: uppercase;
        }
        .pool-item {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 18px; cursor: default;
            transition: background 0.25s;
        }
        .pool-item:hover { background: rgba(255,255,255,0.04); }
        .pool-dot {
            width: 10px; height: 10px; border-radius: 50%;
            flex-shrink: 0; box-shadow: 0 0 7px currentColor;
        }
        .pool-name { font-size: 13.5px; color: rgba(255,255,255,0.82); flex: 1; }
        .pool-status {
            font-size: 11px; padding: 2px 8px; border-radius: 6px; font-weight: 500;
        }
        .status-learned {
            background: rgba(38,222,129,0.12); color: #26de81;
            border: 1px solid rgba(38,222,129,0.2);
        }
        .status-planned {
            background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.35);
            border: 1px solid rgba(255,255,255,0.07);
        }
        .pool-footer {
            padding: 10px 18px; border-top: 1px solid rgba(255,255,255,0.06);
            display: flex; justify-content: space-between;
            font-size: 12px; color: rgba(255,255,255,0.4);
            flex-shrink: 0;
        }
        .pool-footer .count-learned { color: #26de81; font-weight: 600; }

        /* 折叠/展开按钮 */
        .pool-toggle {
            margin-left: auto;
            width: 26px; height: 26px; flex-shrink: 0;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.7);
            border-radius: 8px; cursor: pointer;
            font-size: 15px; line-height: 1;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s var(--ease);
        }
        .pool-toggle:hover { background: rgba(96,165,250,0.12); color: #fff; border-color: rgba(96,165,250,0.3); }
        .skill-pool.collapsed { width: auto; }
        .skill-pool.collapsed .pool-search,
        .skill-pool.collapsed .pool-list,
        .skill-pool.collapsed .pool-footer,
        .skill-pool.collapsed .subtitle { display: none; }
        .skill-pool.collapsed .pool-toggle { transform: rotate(180deg); }

        /* ===== 图例（右侧） ===== */
        .legend {
            position: fixed; top: 78px; right: 18px;
            z-index: 50;
            background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 16px 18px;
            border-radius: 16px; border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow); font-size: 13px; min-width: 146px;
        }
        .legend-title { font-size: 11px; letter-spacing: 1.2px; color: rgba(255,255,255,0.48); margin-bottom: 12px; text-transform: uppercase; font-weight: 600; }
        .legend-item { display: flex; align-items: center; gap: 9px; margin-bottom: 9px; transition: transform 0.3s var(--ease); }
        .legend-item:last-child { margin-bottom: 0; }
        .legend-item:hover { transform: translateX(4px); }
        .legend-dot { width: 12px; height: 12px; border-radius: 50%; box-shadow: 0 0 9px currentColor; flex-shrink: 0; }
        .legend-item span { color: rgba(255,255,255,0.82); }

        /* ===== Tooltip ===== */
        .tooltip {
            position: absolute; z-index: 200;
            background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 16px;
            padding: 16px; pointer-events: none;
            opacity: 0; transform: translateY(8px) scale(0.97);
            transition: opacity 0.28s var(--ease), transform 0.28s var(--ease);
            max-width: 290px; box-shadow: var(--glass-shadow);
        }
        .tooltip.show { opacity: 1; transform: translateY(0) scale(1); }
        .tooltip h3 { margin: 0 0 8px; font-size: 16px; color: #fff; text-shadow: 0 0 12px rgba(255,255,255,0.22); }
        .tooltip .category { display: inline-block; padding: 2px 9px; border-radius: 5px; font-size: 11px; margin-bottom: 8px; font-weight: 600; }
        .tooltip .desc { font-size: 13px; color: rgba(255,255,255,0.7); line-height: 1.58; margin-bottom: 10px; }
        .tooltip .level-bar { height: 4px; background: rgba(255,255,255,0.12); border-radius: 2px; overflow: hidden; margin-top: 5px; }
        .tooltip .level-fill { height: 100%; border-radius: 2px; box-shadow: 0 0 8px currentColor; }
        .tooltip .level-text { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 5px; }

        /* 加载动画 */
        .loading {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%,-50%); z-index: 10;
            display: flex; flex-direction: column; align-items: center; gap: 14px;
            color: rgba(255,255,255,0.58); font-size: 14px; letter-spacing: 0.5px;
        }
        .spinner {
            width: 44px; height: 44px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #8ab4ff; border-right-color: rgba(138,180,255,0.35);
            border-radius: 50%;
            animation: spin 0.85s linear infinite;
            box-shadow: 0 0 16px rgba(138,180,255,0.3);
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* SVG 图谱 */
        svg { cursor: grab; display: block; }
        svg:active { cursor: grabbing; }
        .node circle { cursor: pointer; filter: url(#glow); transition: filter 0.35s var(--ease); }
        .node.focus circle { filter: url(#glow) brightness(1.35); }
        .node text {
            font-size: 12px; fill: #fff; pointer-events: none;
            text-shadow: 0 1px 4px rgba(0,0,0,0.92), 0 0 8px rgba(0,0,0,0.55);
            font-weight: 500; transition: opacity 0.35s var(--ease);
        }
        .link { stroke: #ffffff; stroke-opacity: 0.3; transition: stroke-opacity 0.4s var(--ease), stroke 0.4s var(--ease); }
        .link.dim { stroke-opacity: 0.04 !important; }
        .link.highlight { stroke-opacity: 0.95 !important; }
        .node { transition: opacity 0.4s var(--ease); }
        .node.dim { opacity: 0.2; }

        /* 核心节点脉冲光环 */
        .pulse-ring {
            fill: none; stroke: #ffffff; stroke-width: 2px;
            pointer-events: none; transform-origin: center;
            animation: corePulse 2.6s var(--ease) infinite;
        }
        .pulse-ring.delay { animation-delay: 1.3s; }
        @keyframes corePulse {
            0%   { r: 46px;  opacity: 0.72; stroke-width: 3px; }
            100% { r: 105px; opacity: 0;     stroke-width: 0.4px; }
        }

        /* 目标标签 */
        .goal-badge {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            background: linear-gradient(135deg, rgba(165,94,234,0.15), rgba(96,165,250,0.12));
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(165,94,234,0.25);
            border-radius: 30px;
            padding: 10px 24px;
            font-size: 13px; color: rgba(255,255,255,0.75);
            letter-spacing: 0.5px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.06);
        }
        .goal-badge strong { color: #a55eea; font-weight: 700; }
    </style>
    <link rel="stylesheet" href="assets/techfx.css">
</head>
<body>

<canvas id="stars"></canvas>

<!-- 导航 -->
<div class="nav">
    <span class="nav-title">🕸️ 技能知识图谱</span>
    <a href="index.html">🏠 首页</a>
    <a href="blog/index.html">📝 博客</a>
    <a href="channels.html">🎯 频道</a>
</div>

<!-- 技能池参考面板 -->
<div class="skill-pool">
    <div class="pool-header">
        <span class="menu-icon">☰</span>
        <h3>技能池</h3>
        <span class="subtitle">学习路线参考</span>
        <button class="pool-toggle" id="poolToggle" title="折叠 / 展开">‹</button>
    </div>
    <div class="pool-search">
        <input type="text" id="poolSearch" placeholder="搜索技能...">
    </div>
    <div class="pool-list" id="poolList"></div>
    <div class="pool-footer">
        <span>已掌握: <span class="count-learned" id="learnedCount">0</span></span>
        <span>共 <span id="totalCount">0</span> 项</span>
    </div>
</div>

<!-- 图例 -->
<div class="legend">
    <div class="legend-title">分类图例</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ff6b6b;color:#ff6b6b"></div><span>编程语言</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#4ecdc4;color:#4ecdc4"></div><span>前端开发</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#45b7d1;color:#45b7d1"></div><span>后端/数据库</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#ffa502;color:#ffa502"></div><span>DevOps/工具</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#a55eea;color:#a55eea"></div><span>AI/数据</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#26de81;color:#26de81"></div><span>软技能</span></div>
</div>

<!-- Tooltip / Loading -->
<div class="tooltip" id="tooltip"></div>
<div class="loading" id="loading">
    <div class="spinner"></div>
    <div>正在点亮星系...</div>
</div>
<div id="graph"></div>

<!-- 目标标签 -->
<div class="goal-badge">🎯 学习目标：<strong>AI Java 后端工程师</strong>（结合 AI 工具编程）</div>


<script>
/* ================================================================
   数据定义

   【如何添加新技能】学会一个新技能，分两步：

   Step 1 — 在下方 SKILLS 数组里加一条（已掌握的才加到这里）：
     { id: "新技能名", group: "分类", level: 掌握程度(0-100), desc: "简短描述" },

     group 可选值：lang / frontend / backend / devops / ai / soft

   Step 2 — 如果新技能和已有技能有关联，在 LINKS 数组里加一条：
     ["已有技能名", "新技能名"],

   改完保存 → git push → 等 1~2 分钟 GitHub Pages 构建完即上线。
   ================================================================ */

// ── 已掌握的技能（图谱中实际显示的节点） ──
const SKILLS = [
    // ---- DevOps/工具 ────（其他编程语言/技术先不展示，学会一个加一个）
    { id: "Git",         group: "devops",    level: 88, desc: "分支策略，Rebase，Cherry-pick，CI/CD 集成" },

    // ---- 软技能 ----
    { id: "技术写作",    group: "soft",      level: 85, desc: "技术博客，文档编写，知识沉淀" },
    { id: "问题解决",    group: "soft",      level: 88, desc: "Debug 思路，根因分析，系统性思维" },
    { id: "团队协作",    group: "soft",      level: 80, desc: "Code Review，技术分享，跨部门沟通" }
];

// ── 连线关系：source → target 表示「source 是 target 的前置依赖或关联」 ──
// 注：除了下面这些，中心节点 binqi 还会自动连线到每个已掌握的技能
const LINKS = [
    ["问题解决","技术写作"],
    ["问题解决","团队协作"],
    ["技术写作","团队协作"]
];

/*
 * ── 技能池完整列表（含未学习的，仅用于左侧参考面板显示） ──
 *
 * 这个数组包含「已掌握」+「计划学习」的全部技能。
 * 只有 SKILLS 数组里的才会渲染到图谱中；这里的只是侧栏参考。
 * 学会后从 SKILL_POOL 复制一条到上方 SKILLS 数组即可。
 */
const SKILL_POOL = [
    // ═══ 编程语言 ═══
    { id: "Java",         group: "lang" },
    { id: "JavaScript",   group: "lang" },
    { id: "Python",       group: "lang" },
    { id: "SQL",          group: "lang" },
    { id: "HTML/CSS",     group: "lang" },
    { id: "TypeScript",   group: "lang" },       // 📌 计划学
    { id: "Go",           group: "lang" },        // 📌 计划学
    { id: "C/C++",        group: "lang" },        // 📌 计划学

    // ═══ 前端开发 ═══
    { id: "React",        group: "frontend" },    // 📌 计划学
    { id: "Vue.js",       group: "frontend" },    // 📌 计划学
    { id: "Tailwind",     group: "frontend" },    // 📌 计划学

    // ═══ 后端/数据库 ═══
    { id: "Spring Boot",  group: "backend" },
    { id: "MySQL",        group: "backend" },
    { id: "Redis",        group: "backend" },
    { id: "Node.js",      group: "backend" },
    { id: "MyBatis",      group: "backend" },     // 📌 计划学
    { id: "MongoDB",      group: "backend" },     // 📌 计划学
    { id: "RabbitMQ",     group: "backend" },     // 📌 计划学
    { id: "Elasticsearch",group: "backend" },     // 📌 计划学

    // ═══ DevOps/工具 ═══
    { id: "Git",          group: "devops" },
    { id: "Linux",        group: "devops" },
    { id: "Docker",       group: "devops" },
    { id: "Nginx",        group: "devops" },      // 📌 计划学
    { id: "Kubernetes",   group: "devops" },      // 📌 计划学
    { id: "GitHub Actions",group:"devops" },      // 📌 计划学
    { id: "CI/CD",        group: "devops" },      // 📌 计划学
    { id: "Terraform",    group: "devops" },      // 📌 计划学
    { id: "Vim/Neovim",   group: "devops" },      // 📌 计划学

    // ═══ AI/数据 ═══
    { id: "OpenAI API",   group: "ai" },
    { id: "机器学习",      group: "ai" },
    { id: "深度学习",      group: "ai" },         // 📌 计划学
    { id: "NLP",          group: "ai" },          // 📌 计划学
    { id: "LangChain",    group: "ai" },          // 📌 计划学
    { id: "RAG",          group: "ai" },          // 📌 计划学
    { id: "向量数据库",    group: "ai" },          // 📌 计划学
    { id: "Pandas",       group: "ai" },          // 📌 计划学

    // ═══ 软技能 ═══
    { id: "技术写作",      group: "soft" },
    { id: "问题解决",      group: "soft" },
    { id: "团队协作",      group: "soft" },
    { id: "英语读写",      group: "soft" }         // 📌 计划学
];

/* ==================== 配色 ==================== */
const colors = {
    lang:"#ff6b6b", frontend:"#4ecdc4", backend:"#45b7d1",
    devops:"#ffa502", ai:"#a55eea", soft:"#26de81", center:"#ffffff"
};
const groupNames = {
    lang:"编程语言", frontend:"前端开发", backend:"后端/数据库",
    devops:"DevOps/工具", ai:"AI/数据", soft:"软技能", center:"核心"
};
const groupOrder = ["lang","frontend","backend","devops","ai","soft"];

function lighten(hex, amt) {
    const c=hex.replace('#',''), r=parseInt(c.slice(0,2),16), g=parseInt(c.slice(2,4),16), b=parseInt(c.slice(4,6),16);
    return `rgb(${Math.round(r+(255-r)*amt)},${Math.round(g+(255-g)*amt)},${Math.round(b+(255-b)*amt)})`;
}


/* ==================== 构建技能池侧栏 ==================== */
const learnedSet = new Set(SKILLS.map(s => s.id));

function buildPool(filterText) {
    const list = document.getElementById("poolList");
    const ft = (filterText || "").toLowerCase().trim();
    let html = "";
    let learnedCnt = 0;

    for (const grp of groupOrder) {
        const items = SKILL_POOL.filter(s => s.group === grp &&
            (!ft || s.id.toLowerCase().includes(ft)));
        if (items.length === 0 && ft) continue;

        html += `<div class="pool-group-label">${groupNames[grp]}</div>`;
        for (const item of items) {
            const isLearned = learnedSet.has(item.id);
            if (isLearned) learnedCnt++;
            html += `<div class="pool-item" data-id="${item.id}">
                <div class="pool-dot" style="background:${colors[item.group]};color:${colors[item.group]}"></div>
                <span class="pool-name">${item.id}</span>
                <span class="pool-status ${isLearned ? 'status-learned' : 'status-planned'}">${isLearned ? '✓ 已掌握' : '待学习'}</span>
            </div>`;
        }
    }

    list.innerHTML = html;
    document.getElementById("learnedCount").textContent = learnedCnt;
    document.getElementById("totalCount").textContent = SKILL_POOL.length;
}

document.getElementById("poolSearch").addEventListener("input", e => buildPool(e.target.value));
buildPool(); // 初始渲染

// 折叠 / 展开技能池
document.getElementById("poolToggle").addEventListener("click", () => {
    document.querySelector(".skill-pool").classList.toggle("collapsed");
});


/* ==================== 星空画布 ==================== */
const starCanvas=document.getElementById('stars');
const sctx=starCanvas.getContext('2d');
let stars=[];
function initStars(){
    const dpr=window.devicePixelRatio||1;
    starCanvas.width=window.innerWidth*dpr; starCanvas.height=window.innerHeight*dpr;
    starCanvas.style.width=window.innerWidth+'px'; starCanvas.style.height=window.innerHeight+'px';
    sctx.setTransform(dpr,0,0,dpr,0,0);
    stars=Array.from({length:200},()=>({
        x:Math.random()*window.innerWidth, y:Math.random()*window.innerHeight,
        r:Math.random()*1.4+0.3, base:Math.random()*.5+.25,
        speed:Math.random()*.8+.3, phase:Math.random()*Math.PI*2,
        hue:Math.random()<.15?210:(Math.random()<.1?280:0)
    }));
}
function drawStars(t){
    sctx.clearRect(0,0,window.innerWidth,window.innerHeight);
    for(const s of stars){
        const tw=.5+.5*Math.sin(t*.001*s.speed+s.phase), alpha=s.base*(.35+.65*tw);
        sctx.beginPath(); sctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        if(s.hue===210)sctx.fillStyle=`rgba(150,190,255,${alpha})`;
        else if(s.hue===280)sctx.fillStyle=`rgba(200,160,255,${alpha})`;
        else sctx.fillStyle=`rgba(255,255,255,${alpha})`;
        sctx.fill();
    } requestAnimationFrame(drawStars);
}
initStars(); requestAnimationFrame(drawStars);
window.addEventListener('resize',initStars);


/* ==================== 构建节点与连线 ==================== */
const centerNode = { id:"binqi", group:"center", level:100, desc:"AI Java 后端工程师 | 热爱技术，持续学习" };
const nodes = [centerNode, ...SKILLS];
const nodeMap = new Map(nodes.map(n => [n.id, n]));

const links = LINKS.map(([srcId, tgtId]) => ({
    source: nodeMap.get(srcId),
    target: nodeMap.get(tgtId)
})).filter(l => l.source && l.target);

// 每个技能都连向中心
SKILLS.forEach(s => {
    links.push({ source: centerNode, target: s });
});

function neighbors(id){
    const set=new Set([id]);
    links.forEach(l=>{
        if(l.source.id===id)set.add(l.target.id);
        if(l.target.id===id)set.add(l.source.id);
    });
    return set;
}


/* ==================== SVG 初始化与渲染 ==================== */
const W=window.innerWidth, H=window.innerHeight;

const svg=d3.select("#graph").append("svg")
    .attr("width",W).attr("height",H)
    .attr("viewBox",[-W/2,-H/2,W,H]);

const defs=svg.append("defs");
// 霓虹光晕滤镜
const glowFilter=defs.append("filter").attr("id","glow")
    .attr("x","-60%").attr("y","-60%").attr("width","220%").attr("height","220%");
glowFilter.append("feGaussianBlur").attr("stdDeviation","3.2").attr("result","blur");
const feMerge=glowFilter.append("feMerge");
feMerge.append("feMergeNode").attr("in","blur");
feMerge.append("feMergeNode").attr("in","SourceGraphic");

// 各分类渐变
Object.entries(colors).forEach(([k,c])=>{
    const g=defs.append("radialGradient").attr(`id`,`grad-${k}`)
        .attr("cx","35%").attr("cy","32%").attr("r","70%");
    g.append("stop").attr("offset","0%").attr("stop-color",lighten(c,.55));
    g.append("stop").attr("offset","60%").attr("stop-color",c);
    g.append("stop").attr("offset","100%").attr("stop-color",lighten(c,-.15));
});

const g=svg.append("g");
const zoom=d3.zoom().scaleExtent([.15,4]).on("zoom",(e)=>g.attr("transform",e.transform));
svg.call(zoom);

const tooltip=d3.select("#tooltip");

// 连线
const linkSel=g.append("g").selectAll("line")
    .data(links).join("line")
    .attr("class","link")
    .attr("stroke-width", d=>
        (d.source.group==="center"||d.target.group==="center")?2.5:1);

// 节点
const nodeSel=g.append("g").selectAll("g")
    .data(nodes).join("g")
    .attr("class","node")
    .call(d3.drag()
        .on("start",(e,d)=>{
            if(!e.active)simulation.alphaTarget(.3).restart();
            d.fx=d.x; d.fy=d.y;
        })
        .on("drag",(e,d)=>{ d.fx=e.x; d.fy=e.y; })
        .on("end",(e,d)=>{
            if(!e.active)simulation.alphaTarget(0);
            d.fx=null; d.fy=null;
        }));

// 脉冲光环（仅中心）
nodeSel.filter(d=>d.group==="center")
    .append("circle").attr("class","pulse-ring").attr("r",46);
nodeSel.filter(d=>d.group==="center")
    .append("circle").attr("class","pulse-ring delay").attr("r",46);

// 节点圆形
nodeSel.append("circle")
    .attr("r", d=>d.group==="center"?44:Math.max(17,d.level/4.3))
    .attr("fill", d=>`url(#grad-${d.group})`)
    .attr("stroke", d=>colors[d.group])
    .attr("stroke-width", d=>d.group==="center"?2.5:1.5)
    .attr("stroke-opacity",0.9);

// 节点文字
nodeSel.append("text")
    .attr("dy", d=>d.group==="center"?5:4)
    .attr("text-anchor","middle")
    .text(d=>d.id)
    .style("font-size", d=>d.group==="center"?"15px":"11px")
    .style("font-weight", d=>d.group==="center"?"700":"500");

// 事件绑定（悬停高亮 + Tooltip）
nodeSel.on("mouseover", function(event,d){
    const near=neighbors(d.id);
    linkSel.classed("dim",l=>!(l.source.id===d.id||l.target.id===d.id))
          .classed("highlight",l=>l.source.id===d.id||l.target.id===d.id)
          .attr("stroke",l=>(l.source.id===d.id||l.target.id===d.id)?colors[d.group]:"#fff");
    nodeSel.classed("dim",n=>!(near.has(n.id)||n.group==="center"))
           .classed("focus",n=>n.id===d.id);

    tooltip.html(`
        <h3>${d.id}</h3>
        <span class="category" style="background:${colors[d.group]}26;color:${colors[d.group]};border:1px solid ${colors[d.group]}66">${groupNames[d.group]}</span>
        <div class="desc">${d.desc}</div>
        <div class="level-text">掌握程度: ${d.level}%</div>
        <div class="level-bar"><div class="level-fill" style="width:${d.level}%;background:${colors[d.group]};color:${colors[d.group]}"></div></div>
    `);
    tooltip.style("left",(event.pageX+18)+"px").style("top",(event.pageY-12)+"px").classed("show",true);
})
.on("mousemove", event=>{
    tooltip.style("left",(event.pageX+18)+"px").style("top",(event.pageY-12)+"px");
})
.on("mouseout", ()=>{
    linkSel.classed("dim",false).classed("highlight",false).attr("stroke","#fff");
    nodeSel.classed("dim",false).classed("focus",false);
    tooltip.classed("show",false);
})
.on("click", ()=>simulation.alpha(.3).restart());

// 力模拟
let simulation=d3.forceSimulation(nodes)
    .force("link", d3.forceLink(links).id(d=>d.id)
        .distance(d=>(d.source.group==="center"||d.target.group==="center")?150:95))
    .force("charge", d3.forceManyBody()
        .strength(d=>d.group==="center"?-1400:-380))
    .force("center", d3.forceCenter(0,0))
    .force("collision", d3.forceCollide()
        .radius(d=>d.group==="center"?60:38))
    .force("x", d3.forceX().strength(.045))
    .force("y", d3.forceY().strength(.045));

simulation.on("tick",()=>{
    linkSel.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y)
          .attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
    nodeSel.attr("transform",d=>`translate(${d.x},${d.y})`);
});


/* ==================== 初始化 ==================== */
setTimeout(()=>{
    document.getElementById("loading").style.display="none";
    svg.transition().duration(900).ease(d3.easeCubicInOut)
        .call(zoom.transform, d3.zoomIdentity.scale(0.95));
}, 500);

window.addEventListener("resize",()=>{
    const w=window.innerWidth, h=window.innerHeight;
    svg.attr("width",w).attr("height",h).attr("viewBox",[-w/2,-h/2,w,h]);
});

</script>
<script src="assets/bubbles.js"></script>
</body>
</html>
