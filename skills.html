<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技能知识图谱 | binqi</title>
    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
    <style>
        :root {
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
            --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
            --glass-bg: rgba(14, 17, 40, 0.55);
            --glass-border: rgba(255, 255, 255, 0.13);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5),
                            0 2px 8px rgba(0, 0, 0, 0.38),
                            inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: radial-gradient(ellipse 120% 90% at 50% 42%, #1b2150 0%, #0d1030 38%, #05060f 72%, #000007 100%);
            color: #fff;
            overflow: hidden;
        }

        /* ===== 星空画布 ===== */
        #stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        #graph   { position: fixed; inset: 0; z-index: 1; }

        /* ===== 导航栏（升级） ===== */
        .nav {
            position: fixed; top: 0; left: 0; right: 0;
            z-index: 100;
            background: rgba(10, 14, 26, 0.78);
            backdrop-filter: blur(24px) saturate(1.4); -webkit-backdrop-filter: blur(24px) saturate(1.4);
            padding: 0 28px;
            display: flex; align-items: center; gap: 4px;
            height: 62px;
            border-bottom: 1px solid transparent;
            background-image: linear-gradient(to right, rgba(96,165,250,0.07), rgba(167,139,250,0.05), transparent 50%);
            box-shadow: 0 1px 0 rgba(255,255,255,0.05), 0 4px 20px rgba(0,0,0,0.25);
        }
        .nav a {
            position: relative;
            color: rgba(255,255,255,0.6); text-decoration: none; font-size: 13.5px;
            font-weight: 500;
            padding: 8px 16px; border-radius: 10px;
            transition: all 0.35s var(--ease);
            letter-spacing: 0.2px;
        }
        .nav a::after {
            content: '';
            position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%) scaleX(0);
            width: 18px; height: 2px; border-radius: 2px;
            background: linear-gradient(90deg, #60a5fa, #22d3ee);
            transition: transform 0.35s var(--ease);
            box-shadow: 0 0 8px rgba(96,165,250,0.4);
        }
        .nav a:hover { color: #fff; background: rgba(96,165,250,0.08); text-shadow: 0 0 16px rgba(96,165,250,0.45); }
        .nav a:hover::after { transform: translateX(-50%) scaleX(1); }
        .nav-title { font-size: 17px; font-weight: 800; color: #fff; margin-right: auto; letter-spacing: 1px; background: linear-gradient(135deg,#fff,#60a5fa,#a78bfa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }

        /* ===== 技能池面板（可折叠） ===== */
        .pool-panel {
            position: fixed; top: 78px; left: 18px; bottom: 70px;
            width: 260px; z-index: 60;
            background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            box-shadow: var(--glass-shadow);
            display: flex; flex-direction: column;
            overflow: hidden;
            transition: transform 0.45s var(--ease), opacity 0.35s var(--ease);
        }
        .pool-panel.collapsed { transform: translateX(-278px); opacity: 0; pointer-events: none; }
        .pool-header {
            padding: 16px 18px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex; align-items: center; gap: 10px;
            flex-shrink: 0;
        }
        .pool-header h3 {
            font-size: 14px; font-weight: 600; color: #fff;
            text-shadow: 0 0 10px rgba(150,190,255,0.3); flex: 1;
        }
        .pool-toggle-btn {
            position: fixed; left: 20px; top: 86px; z-index: 61;
            width: 34px; height: 34px; border-radius: 10px;
            background: var(--glass-bg); backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            color: rgba(255,255,255,0.75); cursor: pointer;
            font-size: 17px; display: flex; align-items: center; justify-content: center;
            box-shadow: var(--glass-shadow);
            transition: transform 0.35s var(--ease-bounce), background 0.3s var(--ease);
        }
        .pool-toggle-btn:hover { background: rgba(60,80,160,0.4); transform: scale(1.08); }
        .pool-toggle-btn.hidden { display: none; }
        .pool-search {
            padding: 10px 18px 8px;
        }
        .pool-search input {
            width: 100%; padding: 9px 14px;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.06);
            color: #fff; font-size: 13px; outline: none;
            transition: border-color 0.3s var(--ease), background 0.3s var(--ease),
                        box-shadow 0.3s var(--ease);
        }
        .pool-search input::placeholder { color: rgba(255,255,255,0.38); }
        .pool-search input:focus {
            border-color: rgba(120,180,255,0.55);
            background: rgba(30,50,110,0.4);
            box-shadow: 0 0 16px rgba(120,180,255,0.25);
        }
        .pool-list {
            flex: 1; overflow-y: auto; padding: 4px 10px 12px;
            scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.15) transparent;
        }
        .pool-list::-webkit-scrollbar { width: 5px; }
        .pool-list::-webkit-scrollbar-track { background: transparent; }
        .pool-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
        /* 分类标签 */
        .pool-group-label {
            font-size: 11px; letter-spacing: 1.2px; text-transform: uppercase;
            color: rgba(255,255,255,0.4); padding: 10px 8px 4px;
            font-weight: 600;
        }
        .pool-item {
            display: flex; align-items: center; gap: 10px;
            padding: 7px 10px; margin-bottom: 2px;
            border-radius: 10px; cursor: pointer;
            transition: background 0.25s var(--ease), transform 0.25s var(--ease);
            user-select: none;
        }
        .pool-item:hover {
            background: rgba(255,255,255,0.08);
            transform: translateX(4px);
        }
        .pool-item.in-graph {
            opacity: 0.32; pointer-events: none;
        }
        .pool-dot {
            width: 10px; height: 10px; border-radius: 50%;
            flex-shrink: 0;
            box-shadow: 0 0 7px currentColor;
        }
        .pool-name { font-size: 13px; color: rgba(255,255,255,0.88); }
        .pool-add-icon {
            margin-left: auto; font-size: 11px;
            color: rgba(255,255,255,0.3);
            transition: color 0.25s var(--ease), transform 0.25s var(--ease);
        }
        .pool-item:hover .pool-add-icon { color: #8ab4ff; transform: scale(1.2); }
        .pool-item.in-graph .pool-add-icon { content: '✓'; color: #26de81; }
        .pool-stats {
            padding: 10px 18px 14px;
            border-top: 1px solid rgba(255,255,255,0.08);
            font-size: 12px; color: rgba(255,255,255,0.45);
            display: flex; justify-content: space-between;
        }
        .pool-count { color: #8ab4ff; font-weight: 600; }

        /* ===== 图例（右侧） ===== */
        .legend {
            position: fixed; top: 78px; right: 18px;
            z-index: 50;
            background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 16px 18px;
            border-radius: 16px; border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow); font-size: 13px; min-width: 146px;
        }
        .legend-title { font-size: 11px; letter-spacing: 1.2px; color: rgba(255,255,255,0.48); margin-bottom: 12px; text-transform: uppercase; font-weight: 600; }
        .legend-item { display: flex; align-items: center; gap: 9px; margin-bottom: 9px; transition: transform 0.3s var(--ease); }
        .legend-item:last-child { margin-bottom: 0; }
        .legend-item:hover { transform: translateX(4px); }
        .legend-dot { width: 12px; height: 12px; border-radius: 50%; box-shadow: 0 0 9px currentColor; flex-shrink: 0; }
        .legend-item span { color: rgba(255,255,255,0.82); }

        /* ===== Tooltip ===== */
        .tooltip {
            position: absolute; z-index: 200;
            background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 16px;
            padding: 16px; pointer-events: none;
            opacity: 0; transform: translateY(8px) scale(0.97);
            transition: opacity 0.28s var(--ease), transform 0.28s var(--ease);
            max-width: 290px; box-shadow: var(--glass-shadow);
        }
        .tooltip.show { opacity: 1; transform: translateY(0) scale(1); }
        .tooltip h3 { margin: 0 0 8px; font-size: 16px; color: #fff; text-shadow: 0 0 12px rgba(255,255,255,0.22); }
        .tooltip .category { display: inline-block; padding: 2px 9px; border-radius: 5px; font-size: 11px; margin-bottom: 8px; font-weight: 600; }
        .tooltip .desc { font-size: 13px; color: rgba(255,255,255,0.7); line-height: 1.58; margin-bottom: 10px; }
        .tooltip .level-bar { height: 4px; background: rgba(255,255,255,0.12); border-radius: 2px; overflow: hidden; margin-top: 5px; }
        .tooltip .level-fill { height: 100%; border-radius: 2px; box-shadow: 0 0 8px currentColor; }
        .tooltip .level-text { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 5px; }
        .tooltip .tip-hint { font-size: 11px; color: rgba(255,255,255,0.38); margin-top: 8px; padding-top: 7px; border-top: 1px solid rgba(255,255,255,0.07); }

        /* ===== 控制按钮（升级） ===== */
        .controls {
            position: fixed; bottom: 22px; left: 22px; z-index: 50;
            display: flex; gap: 8px;
        }
        .controls button {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(96,165,250,0.2);
            color: rgba(255,255,255,0.85);
            padding: 10px 18px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.3px;
            transition: all 0.4s var(--ease);
            box-shadow:
                0 4px 16px rgba(0,0,0,0.3),
                0 0 0 1px rgba(255,255,255,0.04),
                inset 0 1px 0 rgba(255,255,255,0.06);
        }
        .controls button:hover {
            transform: translateY(-3px) scale(1.02);
            background: linear-gradient(135deg, rgba(96,165,250,0.18), rgba(34,211,238,0.12));
            border-color: rgba(96,165,250,0.45);
            color: #fff;
            box-shadow:
                0 8px 28px rgba(0,0,0,0.4),
                0 0 20px rgba(96,165,250,0.2),
                0 0 0 1px rgba(96,165,250,0.15),
                inset 0 1px 0 rgba(255,255,255,0.1);
            text-shadow: 0 0 10px rgba(255,255,255,0.25);
        }
        .controls button:active { transform: translateY(-1px) scale(0.99); }
        .controls button.danger:hover {
            background: linear-gradient(135deg, rgba(248,113,113,0.18), rgba(220,38,38,0.12));
            border-color: rgba(248,113,113,0.4);
            box-shadow:
                0 8px 28px rgba(0,0,0,0.4),
                0 0 20px rgba(248,113,113,0.15),
                inset 0 1px 0 rgba(255,255,255,0.08);
        }

        /* ===== 加载动画 ===== */
        .loading {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%,-50%); z-index: 10;
            display: flex; flex-direction: column; align-items: center; gap: 14px;
            color: rgba(255,255,255,0.58); font-size: 14px; letter-spacing: 0.5px;
        }
        .spinner {
            width: 44px; height: 44px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #8ab4ff; border-right-color: rgba(138,180,255,0.35);
            border-radius: 50%;
            animation: spin 0.85s linear infinite;
            box-shadow: 0 0 16px rgba(138,180,255,0.3);
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== SVG 图谱交互 ===== */
        svg { cursor: grab; display: block; }
        svg:active { cursor: grabbing; }
        .node circle { cursor: pointer; filter: url(#glow); transition: filter 0.35s var(--ease); }
        .node.focus circle { filter: url(#glow) brightness(1.35); }
        .node text {
            font-size: 12px; fill: #fff; pointer-events: none;
            text-shadow: 0 1px 4px rgba(0,0,0,0.92) , 0 0 8px rgba(0,0,0,0.55);
            font-weight: 500; transition: opacity 0.35s var(--ease);
        }
        .link { stroke: #ffffff; stroke-opacity: 0.3; transition: stroke-opacity 0.4s var(--ease), stroke 0.4s var(--ease); }
        .link.dim { stroke-opacity: 0.04 !important; }
        .link.highlight { stroke-opacity: 0.95 !important; }
        .node { transition: opacity 0.4s var(--ease); }
        .node.dim { opacity: 0.2; }
        .node.new-entrance circle { animation: popIn 0.5s var(--ease-bounce) forwards; }
        @keyframes popIn {
            0%   { r: 0; opacity: 0; }
            65%  { r: calc(var(--target-r) * 1.25); }
            100% { r: var(--target-r); opacity: 1; }
        }

        /* 核心节点脉冲光环 */
        .pulse-ring {
            fill: none; stroke: #ffffff; stroke-width: 2px;
            pointer-events: none; transform-origin: center;
            animation: corePulse 2.6s var(--ease) infinite;
        }
        .pulse-ring.delay { animation-delay: 1.3s; }
        @keyframes corePulse {
            0%   { r: 46px;  opacity: 0.72; stroke-width: 3px; }
            100% { r: 105px; opacity: 0;     stroke-width: 0.4px; }
        }

        /* 删除按钮（右键菜单） */
        .ctx-menu {
            position: absolute; z-index: 300;
            background: var(--glass-bg); backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 12px;
            padding: 6px 0; min-width: 160px; box-shadow: var(--glass-shadow);
            display: none;
        }
        .ctx-menu.show { display: block; animation: ctxIn 0.2s var(--ease-bounce); }
        @keyframes ctxIn { from { opacity:0; transform:scale(0.92)translateY(-4px); } }
        .ctx-item {
            padding: 8px 16px; font-size: 13px; color: rgba(255,255,255,0.82);
            cursor: pointer; display: flex; align-items: center; gap: 10px;
            transition: background 0.2s var(--ease);
        }
        .ctx-item:hover { background: rgba(255,255,255,0.09); }
        .ctx-item.danger:hover { background: rgba(220,60,60,0.25); color: #ff8a8a; }
        .ctx-divider { height: 1px; background: rgba(255,255,255,0.08); margin: 4px 0; }

        /* 提示 Toast */
        .toast {
            position: fixed; bottom: 74px; left: 50%; transform: translateX(-50%);
            z-index: 400;
            background: var(--glass-bg); backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 10px; padding: 9px 20px;
            font-size: 13px; color: #fff;
            box-shadow: 0 6px 24px rgba(0,0,0,0.4);
            opacity: 0; transition: opacity 0.35s var(--ease), transform 0.35s var(--ease);
            pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* 模式切换标签（升级） */
        .mode-tabs {
            position: fixed; bottom: 22px; right: 22px; z-index: 50;
            display: flex; gap: 4px;
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(96,165,250,0.18);
            border-radius: 14px; padding: 5px;
            box-shadow:
                0 4px 20px rgba(0,0,0,0.3),
                0 0 0 1px rgba(255,255,255,0.04),
                inset 0 1px 0 rgba(255,255,255,0.05);
        }
        .mode-tab {
            padding: 8px 18px; border-radius: 10px; border: none;
            background: transparent; color: rgba(255,255,255,0.5);
            font-size: 12.5px; font-weight: 600; cursor: pointer;
            transition: all 0.35s var(--ease); letter-spacing: 0.3px;
        }
        .mode-tab.active {
            background: linear-gradient(135deg, rgba(96,165,250,0.25), rgba(34,211,238,0.15));
            color: #fff;
            box-shadow:
                0 0 14px rgba(96,165,250,0.2),
                inset 0 1px 0 rgba(255,255,255,0.1);
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }
        .mode-tab:hover:not(.active) { color: rgba(255,255,255,0.85); background: rgba(255,255,255,0.06); }
    </style>
<link rel="stylesheet" href="assets/techfx.css">
</head>
<body>

<canvas id="stars"></canvas>

<!-- 导航 -->
<div class="nav">
    <span class="nav-title">🕸️ 技能知识图谱</span>
    <a href="index.html">🏠 首页</a>
    <a href="blog/index.html">📝 博客</a>
    <a href="channels.html">🎯 频道</a>
</div>

<!-- 技能池面板 -->
<button class="pool-toggle-btn" id="poolToggle" title="展开技能池" onclick="togglePool()">☰</button>
<div class="pool-panel" id="poolPanel">
    <div class="pool-header">
        <h3>✨ 技能池</h3>
        <span style="font-size:12px;color:rgba(255,255,255,0.4)">点击添加到图谱</span>
    </div>
    <div class="pool-search">
        <input type="text" id="poolSearch" placeholder="搜索技能..." autocomplete="off">
    </div>
    <div class="pool-list" id="poolList"></div>
    <div class="pool-stats">
        <span>已添加: <span class="pool-count" id="addedCount">0</span></span>
        <span>共 <span id="totalCount">0</span> 项</span>
    </div>
</div>

<!-- 图例 -->
<div class="legend">
    <div class="legend-title">分类图例</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ff6b6b;color:#ff6b6b"></div><span>编程语言</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#4ecdc4;color:#4ecdc4"></div><span>前端开发</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#45b7d1;color:#45b7d1"></div><span>后端/数据库</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#ffa502;color:#ffa502"></div><span>DevOps/工具</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#a55eea;color:#a55eea"></div><span>AI/数据</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#26de81;color:#26de81"></div><span>软技能</span></div>
</div>

<!-- 控制按钮 -->
<div class="controls">
    <button onclick="resetZoom()">⟲ 重置视图</button>
    <button onclick="toggleAnimation()">⏸ 暂停 / 继续</button>
    <button class="danger" onclick="clearGraph()">🗑 清空图谱</button>
</div>

<!-- 模式切换 -->
<div class="mode-tabs">
    <button class="mode-tab active" data-mode="demo" onclick="switchMode('demo',this)">演示案例</button>
    <button class="mode-tab" data-mode="custom" onclick="switchMode('custom',this)">自由编辑</button>
</div>

<!-- 右键菜单 -->
<div class="ctx-menu" id="ctxMenu">
    <div class="ctx-item" id="ctxInfo">ℹ️ 详情</div>
    <div class="ctx-divider"></div>
    <div class="ctx-item danger" id="ctxRemove">🗑 从图谱中移除</div>
</div>

<!-- Tooltip / Loading -->
<div class="tooltip" id="tooltip"></div>
<div class="loading" id="loading">
    <div class="spinner"></div>
    <div>正在点亮星系...</div>
</div>
<div id="graph"></div>
<div class="toast" id="toast"></div>


<script>
/* ================================================================
   数据定义 —— 内嵌，不依赖 fetch，GitHub Pages 稳定加载
   ================================================================ */
const SKILL_POOL = [
    // ---- 编程语言 ----
    { id: "JavaScript", group: "lang", level: 90, desc: "ES6+，异步编程，闭包，原型链，事件循环" },
    { id: "Python",      group: "lang", level: 85, desc: "数据分析，自动化脚本，Flask/FastAPI" },
    { id: "Java",        group: "lang", level: 75, desc: "Spring Boot，多线程，JVM 调优基础" },
    { id: "C/C++",       group: "lang", level: 70, desc: "数据结构，算法竞赛，系统编程基础" },
    { id: "SQL",         group: "lang", level: 80, desc: "复杂查询优化，索引设计，事务管理" },
    { id: "HTML/CSS",    group: "lang", level: 95, desc: "语义化标签，Flex/Grid，响应式设计，CSS 动画" },
    { id: "Go",          group: "lang", level: 62, desc: "Goroutine，Channel，微服务并发编程" },
    { id: "Rust",        group: "lang", level: 48, desc: "所有权模型，零成本抽象，安全内存管理" },

    // ---- 前端开发 ----
    { id: "React",       group: "frontend", level: 85, desc: "Hooks，Redux，Next.js，性能优化" },
    { id: "Vue.js",      group: "frontend", level: 80, desc: "Vue3 Composition API，Pinia，Nuxt.js" },
    { id: "D3.js",       group: "frontend", level: 75, desc: "数据可视化，力导向图，交互式图表" },
    { id: "Tailwind",    group: "frontend", level: 90, desc: "原子化 CSS，自定义主题，响应式工具类" },
    { id: "TypeScript",  group: "frontend", level: 82, desc: "类型系统，泛型，装饰器，类型推断" },
    { id: "Webpack/Vite",group: "frontend", level: 78, desc: "打包优化，代码分割，热更新配置" },

function lighten(hex, amt) {
    const c=hex.replace('#',''), r=parseInt(c.slice(0,2),16), g=parseInt(c.slice(2,4),16), b=parseInt(c.slice(4,6),16);
    return `rgb(${Math.round(r+(255-r)*amt)},${Math.round(g+(255-g)*amt)},${Math.round(b+(255-b)*amt)})`;
}


/* ==================== 星空画布 ==================== */
const starCanvas=document.getElementById('stars');
const sctx=starCanvas.getContext('2d');
let stars=[];
function initStars(){
    const dpr=window.devicePixelRatio||1;
    starCanvas.width=window.innerWidth*dpr; starCanvas.height=window.innerHeight*dpr;
    starCanvas.style.width=window.innerWidth+'px'; starCanvas.style.height=window.innerHeight+'px';
    sctx.setTransform(dpr,0,0,dpr,0,0);
    stars=Array.from({length:200},()=>({
        x:Math.random()*window.innerWidth, y:Math.random()*window.innerHeight,
        r:Math.random()*1.4+0.3, base:Math.random()*.5+.25,
        speed:Math.random()*.8+.3, phase:Math.random()*Math.PI*2,
        hue:Math.random()<.15?210:(Math.random()<.1?280:0)
    }));
}
function drawStars(t){
    sctx.clearRect(0,0,window.innerWidth,window.innerHeight);
    for(const s of stars){
        const tw=.5+.5*Math.sin(t*.001*s.speed+s.phase), alpha=s.base*(.35+.65*tw);
        sctx.beginPath(); sctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        if(s.hue===210)sctx.fillStyle=`rgba(150,190,255,${alpha})`;
        else if(s.hue===280)sctx.fillStyle=`rgba(200,160,255,${alpha})`;
        else sctx.fillStyle=`rgba(255,255,255,${alpha})`;
        sctx.fill();
    } requestAnimationFrame(drawStars);
}
initStars(); requestAnimationFrame(drawStars);
window.addEventListener('resize',initStars);


/* ==================== 全局状态 ==================== */
let currentMode = "demo";   // demo | custom
let activeNodes = [];       // 当前图谱中的节点
let activeLinks = [];       // 当前图谱中的连线
let simulation, linkSel, nodeSel;
let ctxTarget = null;

const W=window.innerWidth, H=window.innerHeight;


/* ==================== SVG 初始化 ==================== */
const svg=d3.select("#graph").append("svg")

const defs=svg.append("defs");
// 霓虹光晕滤镜

glowFilter.append("feGaussianBlur").attr("stdDeviation","3.2").attr("result","blur");
const feMerge=glowFilter.append("feMerge");
feMerge.append("feMergeNode").attr("in","blur");
feMerge.append("feMergeNode").attr("in","SourceGraphic");

// 各分类渐变
Object.entries(colors).forEach(([k,c])=>{
    const g=defs.append("radialGradient").attr(`id`,`grad-${k}`)
        .attr("cx","35%").attr("cy","32%").attr("r","70%");

    g.append("stop").attr("offset","60%").attr("stop-color",c);
    g.append("stop").attr("offset","100%").attr("stop-color",lighten(c,-.15));
});

const g=svg.append("g");
const zoom=d3.zoom().scaleExtent([.15,4]).on("zoom",(e)=>g.attr("transform",e.transform));
svg.call(zoom);

const tooltip=d3.select("#tooltip");
const ctxMenu=d3.select("#ctxMenu");


/* ==================== 技能池渲染 ==================== */
function renderPool(filterText=""){
    const listEl=document.getElementById("poolList");
    const term=(filterText||"").toLowerCase();
    const activeIds=new Set(activeNodes.map(n=>n.id));

    let html="";
    for(const grp of GROUP_ORDER){
        const items=SKILL_POOL.filter(s=>s.group===grp && (!term||s.id.toLowerCase().includes(term)));
        if(items.length===0 && !term) continue;
        html+=`<div class="pool-group-label">${groupNames[grp]}</div>`;
        items.forEach(s=>{
            const inG=activeIds.has(s.id);
            html+=`<div class="pool-item ${inG?'in-graph':''}" data-id="${s.id}" onclick="addSkill('${s.id}')">
                <div class="pool-dot" style="background:${colors[s.grp||s.group]};color:${colors[s.grp||s.group]}"></div>
                <span class="pool-name">${s.id}</span>
                <span class="pool-add-icon">${inG?'✓':'＋'}</span>
            </div>`;
        });
    }
    listEl.innerHTML=html;
    document.getElementById("totalCount").textContent=SKILL_POOL.length;
    document.getElementById("addedCount").textContent=activeIds.size;
}

document.getElementById("poolSearch").addEventListener("input", e=>renderPool(e.target.value));


/* ==================== 核心工具函数 ==================== */

function buildCenterNode(){
    return { id:"binqi", group:"center", level:100, desc:"全栈开发工程师 | 热爱技术，持续学习" };
}

function getSkillData(id){ return SKILL_POOL.find(s=>s.id===id)||null; }

function buildLinksForNodes(nodes){
    const ids=new Set(nodes.map(n=>n.id));
    return LINK_RULES.filter(([src,tgt])=>ids.has(src)&&ids.has(tgt))
        .map(([src,tgt])=>{
            const sn=nodes.find(n=>n.id===src), tn=nodes.find(n=>n.id===tgt);
            return { source:sn, target:tn };
        });
}

function neighbors(id){
    const set=new Set([id]);
    activeLinks.forEach(l=>{
        if(l.source.id===id)set.add(l.target.id);
        if(l.target.id===id)set.add(l.source.id);
    });
    return set;
}


/* ==================== 添加/移除节点 ==================== */

function addSkill(id){
    const existing=activeNodes.find(n=>n.id===id);
    if(existing){
        showToast(`"${id}" 已在图谱中`);
        focusNode(existing);
        return;
    }
    const skillData=getSkillData(id);
    if(!skillData)return;
    // 随机初始位置（靠近中心）
    const newNode={...skillData, x:-200+Math.random()*400, y:-200+Math.random()*400 };
    activeNodes.push(newNode);
    // 计算新增连线
    activeLinks=buildLinksForNodes(activeNodes);
    rebuildGraph();
    renderPool(document.getElementById("poolSearch").value);
    showToast(`已添加 "${id}" ✨`);
}

function removeSkill(id){
    if(id==="binqi"){ showToast("核心节点不可移除"); return; }
    activeNodes=activeNodes.filter(n=>n.id!==id);
    activeLinks=buildLinksForNodes(activeNodes);
    rebuildGraph();
    renderPool(document.getElementById("poolSearch").value);
    showToast(`已移除 "${id}"`);
}

function clearGraph(){
    if(currentMode==="demo"){ switchMode("custom"); }
    activeNodes=[buildCenterNode()];
    activeLinks=[];
    rebuildGraph();
    renderPool();
    showToast("图谱已清空");
}


/* ==================== 图谱重建 ==================== */

function rebuildGraph(){
    if(simulation) simulation.stop();

    g.selectAll(".link").remove();
    g.selectAll(".node").remove();

    // 创建连线
    linkSel=g.append("g").selectAll("line")
        .data(activeLinks)
        .join("line")
        .attr("class","link")
        .attr("stroke-width", d=>
            (d.source.group==="center"||d.target.group==="center")?2.5:1);

    // 创建节点
    nodeSel=g.append("g").selectAll("g")
        .data(activeNodes)
        .join("g")
        .attr("class","node")
        .call(d3.drag()
            .on("start",(e,d)=>{
                if(!e.active)simulation.alphaTarget(.3).restart();
                d.fx=d.x; d.fy=d.y;
            })
            .on("drag",(e,d)=>{ d.fx=e.x; d.fy=e.y; })
            .on("end",(e,d)=>{
                if(!e.active)simulation.alphaTarget(0);
                d.fx=null; d.fy=null;
            }));

    // 脉冲光环（仅中心）
    nodeSel.filter(d=>d.group==="center")
        .append("circle").attr("class","pulse-ring").attr("r",46);
    nodeSel.filter(d=>d.group==="center")
        .append("circle").attr("class","pulse-ring delay").attr("r",46);

    // 节点圆形
    nodeSel.append("circle")
        .attr("r", d=>d.group==="center"?44:Math.max(17,d.level/4.3))
        .attr("fill", d=>`url(#grad-${d.group})`)
        .attr("stroke", d=>colors[d.group])
        .attr("stroke-width", d=>d.group==="center"?2.5:1.5)
        .attr("stroke-opacity",0.9)
        .style("--target-r", d=>(d.group==="center"?44:Math.max(17,d.level/4.3))+"px");

    // 节点文字
    nodeSel.append("text")
        .attr("dy", d=>d.group==="center"?5:4)
        .attr("text-anchor","middle")
        .text(d=>d.id)
        .style("font-size", d=>d.group==="center"?"15px":"11px")
        .style("font-weight", d=>d.group==="center"?"700":"500");

    bindNodeEvents();
    startSimulation();
}

function startSimulation(){
    simulation=d3.forceSimulation(activeNodes)
        .force("link", d3.forceLink(activeLinks).id(d=>d.id)
            .distance(d=>(d.source.group==="center"||d.target.group==="center")?150:95))
        .force("charge", d3.forceManyBody()
            .strength(d=>d.group==="center"?-1400:-380))
        .force("center", d3.forceCenter(0,0))
        .force("collision", d3.forceCollide()
            .radius(d=>d.group==="center"?60:38))
        .force("x", d3.forceX().strength(.045))
        .force("y", d3.forceY().strength(.045));

    simulation.on("tick",()=>{
        linkSel.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y)
              .attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
        nodeSel.attr("transform",d=>`translate(${d.x},${d.y})`);
    });
}

function bindNodeEvents(){
    nodeSel.on("mouseover", function(event,d){
        const near=neighbors(d.id);
        linkSel.classed("dim",l=>!(l.source.id===d.id||l.target.id===d.id))
              .classed("highlight",l=>l.source.id===d.id||l.target.id===d.id)
              .attr("stroke",l=>(l.source.id===d.id||l.target.id===d.id)?colors[d.group]:"#fff");
        nodeSel.classed("dim",n=>!(near.has(n.id)||n.group==="center"))
               .classed("focus",n=>n.id===d.id);

        tooltip.html(`
            <h3>${d.id}</h3>
            <span class="category" style="background:${colors[d.group]}26;color:${colors[d.group]};border:1px solid ${colors[d.group]}66">${groupNames[d.group]}</span>
            <div class="desc">${d.desc}</div>
            <div class="level-text">掌握程度: ${d.level}%</div>
            <div class="level-bar"><div class="level-fill" style="width:${d.level}%;background:${colors[d.group]};color:${colors[d.group]}"></div></div>
            ${d.group!=="center"?'<div class="tip-hint">💡 双击移除此节点 · 拖拽调整位置</div>':'<div class="tip-hint">💡 拖拽调整位置</div>'}
        `);
        tooltip.style("left",(event.pageX+18)+"px").style("top",(event.pageY-12)+"px").classed("show",true);
    })
    .on("mousemove", event=>{
        tooltip.style("left",(event.pageX+18)+"px").style("top",(event.pageY-12)+"px");
    })
    .on("mouseout", ()=>{
        linkSel.classed("dim",false).classed("highlight",false).attr("stroke","#fff");
        nodeSel.classed("dim",false).classed("focus",false);
        tooltip.classed("show",false);
    })
    .on("click", ()=>simulation.alpha(.3).restart())
    .on("dblclick", (event,d)=>{
        if(d.group!=="center") removeSkill(d.id);
    })
    .on("contextmenu", (event,d)=>{
        event.preventDefault();
        ctxTarget=d;
        ctxMenu.style("left",(event.pageX+4)+"px").style("top",(event.pageY+4)+"px")
             .classed("show",true);
    });
}

// 右键菜单操作
document.getElementById("ctxRemove").addEventListener("click",()=>{

});

/* ==================== UI 工具 ==================== */

function togglePool(){
    const p=document.getElementById("poolPanel"), btn=document.getElementById("poolToggle");
    p.classList.toggle("collapsed");
    btn.classList.toggle("hidden", !p.classList.contains("collapsed"));
}

function switchMode(mode, btn){
    currentMode=mode;
    document.querySelectorAll(".mode-tab").forEach(b=>b.classList.remove("active"));
    if(btn) btn.classList.add("active");
    if(mode==="demo"){
        loadDemo();
    }
}

function loadDemo(){
    const center=buildCenterNode();
    activeNodes=[center];
    DEMO_IDS.forEach(id=>{
        if(id!=="binqi"){
            const sd=getSkillData(id);
            if(sd) activeNodes.push({...sd});
        }
    });
    activeLinks=buildLinksForNodes(activeNodes);
    rebuildGraph();
    renderPool(document.getElementById("poolSearch").value);
    showToast("已加载演示案例 🌌");
}

function resetZoom(){
    svg.transition().duration(750).ease(d3.easeCubicInOut)
        .call(zoom.transform, d3.zoomIdentity);
    if(simulation) simulation.alpha(.5).restart();
}

let isRunning=true;
function toggleAnimation(){
    if(simulation){
        if(isRunning) simulation.stop(); else simulation.restart();
        isRunning=!isRunning;
    }
}

function focusNode(node){
    // 将视图平滑移动到该节点
    if(node&&node.x!=null){
        const t=d3.zoomIdentity.translate(-node.x,-node.y).scale(1.5);
        svg.transition().duration(500).ease(d3.easeCubicInOut).call(zoom.transform,t);
    }
}

let toastTimer=null;
function showToast(msg){
    const el=document.getElementById("toast");
    el.textContent=msg; el.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer=setTimeout(()=>el.classList.remove("show"),2500);
}


/* ==================== 初始化 ==================== */
setTimeout(()=>{
    document.getElementById("loading").style.display="none";
    loadDemo();
    setTimeout(resetZoom,800);
}, 450);

window.addEventListener("resize",()=>{
    const w=window.innerWidth, h=window.innerHeight;
    svg.attr("width",w).attr("height",h).attr("viewBox",[-w/2,-h/2,w,h]);
});
